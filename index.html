<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORION AI</title>
<style>
  :root{
    --purple: 178, 90, 255;
    --blue: 0, 140, 255;
    --green: 0, 230, 140;
    --red: 255, 45, 85;
    --state-r: 178; --state-g: 90; --state-b: 255;
  }
  *{margin:0; padding:0; box-sizing:border-box;}
  html, body{
    width:100%; height:100%;
    background:#000;
    overflow:hidden;
    font-family:-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    position:relative;
    cursor:default;
  }

  /* ---------- Header ---------- */
  .header{
    position:fixed;
    top:48px;
    left:50%;
    transform:translateX(-50%);
    text-align:center;
    z-index:5;
  }
  .header h1{
    font-size:15px;
    font-weight:600;
    letter-spacing:6px;
    color:rgba(255,255,255,0.88);
    text-shadow: 0 0 18px rgba(255,255,255,0.35), 0 0 40px rgba(var(--state-r),var(--state-g),var(--state-b),0.15);
    transition: text-shadow 1.2s ease;
    user-select:none;
  }

  /* ---------- Orb ---------- */
  .orb-wrap{
    position:relative;
    width:420px;
    height:420px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
  }
  canvas#orb{
    width:100%;
    height:100%;
    display:block;
  }

  /* ---------- Status text ---------- */
  .status{
    position:fixed;
    top:calc(50% + 260px);
    left:50%;
    transform:translateX(-50%);
    color:rgba(255,255,255,0.55);
    font-size:13px;
    font-weight:400;
    letter-spacing:2.5px;
    text-transform:uppercase;
    opacity:0;
    transition:opacity 0.8s ease;
    user-select:none;
    white-space:nowrap;
  }
  .status.show{ opacity:1; }

  /* ---------- Hint (first-time only) ---------- */
  .hint{
    position:fixed;
    top:calc(50% + 300px);
    left:50%;
    transform:translateX(-50%);
    color:rgba(255,255,255,0.28);
    font-size:11px;
    letter-spacing:1.5px;
    font-weight:300;
    opacity:0;
    transition:opacity 1.5s ease;
    user-select:none;
  }
  .hint.show{ opacity:1; }

  /* ---------- Hidden settings trigger ---------- */
  .settings-trigger{
    position:fixed;
    bottom:22px;
    right:24px;
    width:34px;
    height:34px;
    opacity:0;
    transition:opacity 0.6s ease;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    z-index:10;
  }
  .settings-trigger.visible{ opacity:0.32; }
  .settings-trigger:hover{ opacity:0.7 !important; }
  .settings-trigger svg{ width:18px; height:18px; }

  /* ---------- Settings panel ---------- */
  .settings-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.75);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.4s ease;
    z-index:50;
  }
  .settings-overlay.open{ opacity:1; pointer-events:all; }
  .settings-panel{
    width:360px;
    background:rgba(15,15,18,0.9);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:16px;
    padding:32px;
    transform:translateY(12px) scale(0.98);
    transition:transform 0.4s cubic-bezier(.2,.9,.25,1);
  }
  .settings-overlay.open .settings-panel{ transform:translateY(0) scale(1); }
  .settings-panel h2{
    color:rgba(255,255,255,0.9);
    font-size:13px;
    letter-spacing:3px;
    font-weight:600;
    margin-bottom:24px;
    text-transform:uppercase;
  }
  .settings-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:14px 0;
    border-bottom:1px solid rgba(255,255,255,0.06);
    color:rgba(255,255,255,0.6);
    font-size:13px;
    font-weight:300;
  }
  .settings-row:last-child{ border-bottom:none; }
  .swatches{ display:flex; gap:8px; }
  .swatch{ width:14px; height:14px; border-radius:50%; box-shadow:0 0 8px currentColor; }
  .sw-purple{ background:rgb(178,90,255); color:rgb(178,90,255); }
  .sw-blue{ background:rgb(0,140,255); color:rgb(0,140,255); }
  .sw-green{ background:rgb(0,230,140); color:rgb(0,230,140); }
  .sw-red{ background:rgb(255,45,85); color:rgb(255,45,85); }
  .settings-close{
    margin-top:26px;
    width:100%;
    padding:11px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:9px;
    color:rgba(255,255,255,0.7);
    font-size:12px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    cursor:pointer;
    transition:background 0.2s ease;
  }
  .settings-close:hover{ background:rgba(255,255,255,0.1); }
</style>
</head>
<body>

  <div class="header"><h1>ORION AI</h1></div>

  <div class="orb-wrap" id="orbWrap">
    <canvas id="orb"></canvas>
  </div>

  <div class="status" id="status"></div>
  <div class="hint" id="hint">toque na orb para falar</div>

  <div class="settings-trigger" id="settingsTrigger">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.4">
      <circle cx="12" cy="12" r="3"></circle>
      <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.65 1.65 0 004.6 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.6a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"></path>
    </svg>
  </div>

  <div class="settings-overlay" id="settingsOverlay">
    <div class="settings-panel">
      <h2>Configurações</h2>
      <div class="settings-row"><span>Estado atual</span><span id="stateLabel">Standby</span></div>
      <div class="settings-row"><span>Paleta neon</span>
        <div class="swatches">
          <div class="swatch sw-purple"></div>
          <div class="swatch sw-blue"></div>
          <div class="swatch sw-green"></div>
          <div class="swatch sw-red"></div>
        </div>
      </div>
      <div class="settings-row"><span>Som</span><span>Ativado</span></div>
      <div class="settings-row"><span>Constelação</span><span>Órion</span></div>
      <div class="settings-row"><span>Atalho</span><span>Ctrl + ,</span></div>
      <button class="settings-close" id="settingsClose">Fechar</button>
    </div>
  </div>

<script>
(function(){
  // ---------------- Canvas setup ----------------
  const canvas = document.getElementById('orb');
  const ctx = canvas.getContext('2d');
  const wrap = document.getElementById('orbWrap');
  let W, H, DPR;

  function resize(){
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    const rect = wrap.getBoundingClientRect();
    W = rect.width; H = rect.height;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  // ---------------- States ----------------
  const STATES = {
    standby:   { rgb:[178,90,255],  label:'Standby',   radiusMul:1.0,  rotSpeed:0.00045, particleSpeed:0.35, pulse:0.028, breathe:2.6 },
    listening: { rgb:[0,140,255],   label:'Ouvindo',    radiusMul:1.08, rotSpeed:0.0009,  particleSpeed:0.7,  pulse:0.045, breathe:1.6 },
    responding:{ rgb:[0,230,140],   label:'Respondendo',radiusMul:1.14, rotSpeed:0.0013,  particleSpeed:1.1,  pulse:0.06,  breathe:1.1 },
    error:     { rgb:[255,45,85],   label:'Erro',       radiusMul:0.9,  rotSpeed:0.0025,  particleSpeed:1.4,  pulse:0.08,  breathe:0.5 }
  };
  let current = 'standby';
  let colorNow = [178,90,255];   // animated (lerped) color
  let colorTarget = [178,90,255];
  let radiusMulNow = 1.0, radiusMulTarget = 1.0;

  const root = document.documentElement;
  function setCssColor(rgb){
    root.style.setProperty('--state-r', rgb[0]);
    root.style.setProperty('--state-g', rgb[1]);
    root.style.setProperty('--state-b', rgb[2]);
  }

  function lerp(a,b,t){ return a + (b-a)*t; }
  function lerpColor(a,b,t){ return [lerp(a[0],b[0],t), lerp(a[1],b[1],t), lerp(a[2],b[2],t)]; }

  // ---------------- Orion constellation (normalized coords, -1..1) ----------------
  // Approx real relative layout of Orion's main stars
  const STAR_DEFS = [
    { name:'Betelgeuse', x:-0.62, y:-0.78, z:0.3,  size:3.4, mag:1.0 },
    { name:'Bellatrix',  x:0.55,  y:-0.82, z:-0.2, size:2.6, mag:0.8 },
    { name:'Alnitak',    x:0.16,  y:-0.05, z:0.1,  size:2.0, mag:0.7 },
    { name:'Alnilam',    x:0.0,   y:0.02,  z:0.0,  size:2.2, mag:0.75 },
    { name:'Mintaka',    x:-0.16, y:0.0,   z:-0.1, size:2.0, mag:0.7 },
    { name:'Rigel',      x:-0.5,  y:0.85,  z:0.25, size:3.6, mag:1.0 },
    { name:'Saiph',      x:0.42,  y:0.82,  z:-0.25,size:2.4, mag:0.78 }
  ];
  const LINES = [
    ['Betelgeuse','Alnitak'], ['Alnitak','Alnilam'], ['Alnilam','Mintaka'],
    ['Mintaka','Bellatrix'],
    ['Betelgeuse','Rigel'], ['Bellatrix','Saiph'],
    ['Alnitak','Saiph'], ['Mintaka','Rigel']
  ];

  // ---------------- Particles ----------------
  const PARTICLE_COUNT = 46;
  let particles = [];
  function initParticles(){
    particles = [];
    for(let i=0;i<PARTICLE_COUNT;i++){
      const ang = Math.random()*Math.PI*2;
      const rad = Math.random()*0.9 + 0.05;
      particles.push({
        ang, rad,
        z: Math.random()*2-1,
        speed: 0.15 + Math.random()*0.5,
        driftSpeed: (Math.random()*0.6+0.2) * (Math.random()<0.5?-1:1),
        size: Math.random()*1.6 + 0.5,
        phase: Math.random()*Math.PI*2,
        alphaBase: Math.random()*0.5 + 0.35
      });
    }
  }
  initParticles();

  // ---------------- Animation state ----------------
  let t0 = performance.now();
  let rotation = 0;
  let breathePhase = 0;

  function draw(now){
    const dt = Math.min((now - t0), 32);
    t0 = now;
    const cfg = STATES[current];

    // smooth transitions
    colorNow = lerpColor(colorNow, colorTarget, 0.035);
    radiusMulNow = lerp(radiusMulNow, radiusMulTarget, 0.045);
    setCssColor(colorNow.map(v=>Math.round(v)));

    ctx.clearRect(0,0,W,H);

    const cx = W/2, cy = H/2;
    const baseR = Math.min(W,H) * 0.30;

    breathePhase += dt * 0.001 * cfg.breathe;
    const breathe = Math.sin(breathePhase) * cfg.pulse;
    const R = baseR * (radiusMulNow + breathe);

    rotation += dt * cfg.rotSpeed;

    const [r,g,b] = colorNow;
    const colStr = `rgb(${r|0},${g|0},${b|0})`;

    // ---- outer atmospheric glow ----
    let glow = ctx.createRadialGradient(cx,cy, R*0.2, cx,cy, R*2.3);
    glow.addColorStop(0, `rgba(${r|0},${g|0},${b|0},0.28)`);
    glow.addColorStop(0.4, `rgba(${r|0},${g|0},${b|0},0.10)`);
    glow.addColorStop(1, `rgba(${r|0},${g|0},${b|0},0)`);
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(cx,cy,R*2.3,0,Math.PI*2);
    ctx.fill();

    // ---- sphere body: layered radial gradients for depth/transparency ----
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx,cy,R,0,Math.PI*2);
    ctx.clip();

    let body = ctx.createRadialGradient(cx - R*0.25, cy - R*0.3, R*0.05, cx, cy, R*1.05);
    body.addColorStop(0, `rgba(${Math.min(r+60,255)|0},${Math.min(g+60,255)|0},${Math.min(b+60,255)|0},0.55)`);
    body.addColorStop(0.35, `rgba(${r|0},${g|0},${b|0},0.30)`);
    body.addColorStop(0.75, `rgba(${(r*0.5)|0},${(g*0.5)|0},${(b*0.5)|0},0.16)`);
    body.addColorStop(1, `rgba(0,0,0,0.05)`);
    ctx.fillStyle = body;
    ctx.fillRect(cx-R, cy-R, R*2, R*2);

    // inner core light
    let core = ctx.createRadialGradient(cx,cy,0, cx,cy,R*0.55);
    core.addColorStop(0, `rgba(255,255,255,0.16)`);
    core.addColorStop(1, `rgba(255,255,255,0)`);
    ctx.fillStyle = core;
    ctx.fillRect(cx-R, cy-R, R*2, R*2);

    // ---- particles (energy) inside sphere ----
    for(const p of particles){
      p.ang += dt * 0.0004 * cfg.particleSpeed * p.driftSpeed;
      p.phase += dt * 0.002;
      const depth = (p.z + 1) / 2; // 0..1
      const px = cx + Math.cos(p.ang) * p.rad * R * (0.55 + depth*0.4);
      const py = cy + Math.sin(p.ang) * p.rad * R * (0.55 + depth*0.4) * 0.94;
      const flicker = (Math.sin(p.phase) * 0.5 + 0.5);
      const alpha = p.alphaBase * (0.4 + flicker*0.6) * (0.5 + depth*0.5);
      const sz = p.size * (0.6 + depth*0.8);
      ctx.beginPath();
      ctx.fillStyle = `rgba(255,255,255,${alpha.toFixed(3)})`;
      ctx.shadowColor = colStr;
      ctx.shadowBlur = 6;
      ctx.arc(px,py,sz,0,Math.PI*2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;

    // ---- constellation (rotating, with subtle 3D depth) ----
    const cosA = Math.cos(rotation), sinA = Math.sin(rotation);
    const projected = {};
    for(const s of STAR_DEFS){
      // rotate in XZ plane for slow "turntable" feel
      const x = s.x*cosA - s.z*sinA;
      const z = s.x*sinA + s.z*cosA;
      const y = s.y;
      const scale = 1 + z*0.18; // perspective-ish
      const px = cx + x * R * 0.62 * scale;
      const py = cy + y * R * 0.62 * scale;
      projected[s.name] = { x:px, y:py, z, scale, s };
    }

    // lines
    const linePulse = (Math.sin(now*0.0012) * 0.5 + 0.5);
    ctx.lineWidth = 0.7;
    for(const [a,bn] of LINES){
      const pa = projected[a], pb = projected[bn];
      const depthAvg = (pa.z + pb.z)/2;
      const alpha = (0.16 + linePulse*0.14) * (0.6 + depthAvg*0.4);
      ctx.strokeStyle = `rgba(255,255,255,${Math.max(alpha,0.05).toFixed(3)})`;
      ctx.beginPath();
      ctx.moveTo(pa.x, pa.y);
      ctx.lineTo(pb.x, pb.y);
      ctx.stroke();
    }

    // stars
    for(const name in projected){
      const p = projected[name];
      const twinkle = Math.sin(now*0.003 + p.s.x*10) * 0.5 + 0.5;
      const starAlpha = 0.55 + twinkle*0.45;
      const starSize = p.s.size * p.scale * 0.55;
      ctx.beginPath();
      ctx.fillStyle = `rgba(255,255,255,${starAlpha.toFixed(3)})`;
      ctx.shadowColor = 'rgba(255,255,255,0.9)';
      ctx.shadowBlur = 8 * (0.6+twinkle);
      ctx.arc(p.x, p.y, Math.max(starSize,0.8), 0, Math.PI*2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    ctx.restore(); // end clip

    // ---- rim light ----
    ctx.beginPath();
    ctx.arc(cx,cy,R,0,Math.PI*2);
    ctx.lineWidth = 1.1;
    ctx.strokeStyle = `rgba(${Math.min(r+80,255)|0},${Math.min(g+80,255)|0},${Math.min(b+80,255)|0},0.5)`;
    ctx.shadowColor = colStr;
    ctx.shadowBlur = 24;
    ctx.stroke();
    ctx.shadowBlur = 0;

    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);

  // ---------------- Sound (WebAudio, discreet) ----------------
  let audioCtx = null;
  function ensureAudio(){
    if(!audioCtx){
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if(audioCtx.state === 'suspended') audioCtx.resume();
  }
  function beep(freq, dur, type='sine', gainVal=0.045){
    if(!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(gainVal, audioCtx.currentTime + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + dur + 0.05);
  }
  const SOUNDS = {
    activate:  ()=>{ beep(520,0.18,'sine'); },
    listening: ()=>{ beep(660,0.15,'sine'); },
    responding:()=>{ beep(420,0.12,'triangle'); setTimeout(()=>beep(560,0.14,'triangle'),90); },
    error:     ()=>{ beep(180,0.22,'sawtooth',0.03); }
  };

  // ---------------- Status text ----------------
  const statusEl = document.getElementById('status');
  let statusTimeout;
  function showStatus(text){
    clearTimeout(statusTimeout);
    statusEl.textContent = text;
    statusEl.classList.add('show');
    statusTimeout = setTimeout(()=> statusEl.classList.remove('show'), 2600);
  }

  // ---------------- State transition ----------------
  const stateLabel = document.getElementById('stateLabel');
  function setState(name){
    current = name;
    const cfg = STATES[name];
    colorTarget = cfg.rgb;
    radiusMulTarget = cfg.radiusMul;
    stateLabel.textContent = cfg.label;
  }
  setState('standby');

  // ---------------- Demo interaction flow ----------------
  const hint = document.getElementById('hint');
  let hasInteracted = false;
  let busy = false;

  setTimeout(()=>{ if(!hasInteracted) hint.classList.add('show'); }, 1400);

  function runSequence(){
    if(busy) return;
    busy = true;
    hasInteracted = true;
    hint.classList.remove('show');
    ensureAudio();

    SOUNDS.activate();
    setState('listening');
    showStatus('Ouvindo...');
    SOUNDS.listening();

    setTimeout(()=>{
      setState('responding');
      showStatus('Pensando...');
      SOUNDS.responding();

      setTimeout(()=>{
        showStatus('Analisando...');
      }, 1100);

      setTimeout(()=>{
        showStatus('Resposta pronta.');
      }, 2200);

      setTimeout(()=>{
        setState('standby');
        busy = false;
      }, 3200);
    }, 2200);
  }

  wrap.addEventListener('click', runSequence);

  // simulate an occasional error path with a long-press / right-click (hidden, not documented on screen)
  wrap.addEventListener('contextmenu', (e)=>{
    e.preventDefault();
    if(busy) return;
    busy = true;
    hasInteracted = true;
    hint.classList.remove('show');
    ensureAudio();
    setState('error');
    showStatus('Não compreendi.');
    SOUNDS.error();
    setTimeout(()=>{ setState('standby'); busy = false; }, 1600);
  });

  // ---------------- Settings ----------------
  const trigger = document.getElementById('settingsTrigger');
  const overlay = document.getElementById('settingsOverlay');
  const closeBtn = document.getElementById('settingsClose');
  let mouseTimer;

  window.addEventListener('mousemove', (e)=>{
    const nearCorner = (window.innerWidth - e.clientX < 140) && (window.innerHeight - e.clientY < 120);
    if(nearCorner){
      trigger.classList.add('visible');
      clearTimeout(mouseTimer);
      mouseTimer = setTimeout(()=> trigger.classList.remove('visible'), 2200);
    }
  });

  function openSettings(){ overlay.classList.add('open'); }
  function closeSettings(){ overlay.classList.remove('open'); }

  trigger.addEventListener('click', openSettings);
  closeBtn.addEventListener('click', closeSettings);
  overlay.addEventListener('click', (e)=>{ if(e.target === overlay) closeSettings(); });

  window.addEventListener('keydown', (e)=>{
    if(e.ctrlKey && e.key === ','){
      e.preventDefault();
      overlay.classList.contains('open') ? closeSettings() : openSettings();
    }
    if(e.key === 'Escape') closeSettings();
  });

})();
</script>
</body>
</html>
