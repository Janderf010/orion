<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORION V2</title>
<link rel="icon" type="image/png" href="favicon.png">
<style>
/* =============================================
   ORION V2 — style.css
   Liquid Glass aesthetic · Dark · Minimalist
   ============================================= */

/* ── Reset ───────────────────────────────── */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* ── Tokens ──────────────────────────────── */
:root {
  --black:    #000000;
  --blue:     #3a8eff;
  --cyan:     #00e5ff;
  --purple:   #a259ff;
  --white:    #e8f0ff;
  --white-dim: rgba(232, 240, 255, 0.55);

  --orb-size: clamp(200px, 38vmin, 320px);
  --halo-size: calc(var(--orb-size) * 1.9);

  --font-ui: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
}

/* ── Body ────────────────────────────────── */
body {
  background: var(--black);
  height: 100dvh;
  width: 100vw;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: var(--font-ui);
  color: var(--white);
  -webkit-font-smoothing: antialiased;
}

/* ── Ambient background blobs ────────────── */
.ambient {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

.ambient-blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(100px);
  opacity: 0.12;
  animation: blobDrift 20s ease-in-out infinite alternate;
}

.blob-1 {
  width: 55vw;
  height: 55vw;
  background: var(--blue);
  top: -15%;
  left: -10%;
  animation-delay: 0s;
}

.blob-2 {
  width: 40vw;
  height: 40vw;
  background: var(--purple);
  bottom: -10%;
  right: -5%;
  animation-delay: -7s;
}

.blob-3 {
  width: 30vw;
  height: 30vw;
  background: var(--cyan);
  top: 40%;
  left: 55%;
  animation-delay: -13s;
}

@keyframes blobDrift {
  from { transform: translate(0, 0) scale(1); }
  to   { transform: translate(4%, 6%) scale(1.08); }
}

/* ── Scene ───────────────────────────────── */
.scene {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 32px;
  user-select: none;
}

/* ── Orb scene wrapper ───────────────────── */
.orb-scene {
  position: relative;
  width: var(--halo-size);
  height: var(--halo-size);
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  outline: none;
}

/* ── Halo (outer glow ring) ──────────────── */
.halo {
  position: absolute;
  width: var(--halo-size);
  height: var(--halo-size);
  border-radius: 50%;
  background: conic-gradient(
    from 0deg,
    transparent 0%,
    rgba(58, 142, 255, 0.18) 20%,
    rgba(162, 89, 255, 0.22) 40%,
    rgba(0, 229, 255, 0.18) 60%,
    transparent 80%
  );
  animation: haloSpin 6s linear infinite;
  transition: opacity 0.6s ease;
  opacity: 0.7;
}

.halo::after {
  content: '';
  position: absolute;
  inset: 4px;
  border-radius: 50%;
  background: var(--black);
}

@keyframes haloSpin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

/* ── Orb ─────────────────────────────────── */
.orb {
  position: relative;
  width: var(--orb-size);
  height: var(--orb-size);
  border-radius: 50%;
  cursor: pointer;
  overflow: hidden;

  /* Liquid Glass base */
  background: radial-gradient(
    circle at 38% 32%,
    rgba(255, 255, 255, 0.22) 0%,
    rgba(160, 210, 255, 0.12) 30%,
    rgba(80, 120, 220, 0.08) 60%,
    rgba(10, 10, 30, 0.55) 100%
  );

  /* Glass border */
  border: 1px solid rgba(255, 255, 255, 0.14);
  box-shadow:
    /* outer glow */
    0 0 60px  rgba(58, 142, 255, 0.35),
    0 0 120px rgba(162, 89, 255, 0.20),
    0 0 200px rgba(0, 229, 255, 0.12),
    /* inner depth */
    inset 0 0 60px rgba(0, 0, 0, 0.5),
    inset 0 1px 0 rgba(255,255,255,0.18);

  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);

  /* Breathing pulse — mais rápido e amplo */
  animation: breathe 3.5s ease-in-out infinite, orbFloat 6s ease-in-out infinite;

  transition:
    transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1),
    box-shadow 0.4s ease;
}

/* Hover lift */
.orb-scene:hover .orb,
.orb-scene:focus .orb {
  transform: scale(1.06);
}

/* Click expand */
.orb.pressed {
  transform: scale(1.14) !important;
}

/* ── Orb states ──────────────────────────── */

/* LISTENING — cool cyan-blue pulse */
.orb.listening {
  box-shadow:
    0 0 80px  rgba(0, 229, 255, 0.55),
    0 0 160px rgba(0, 229, 255, 0.30),
    0 0 240px rgba(58, 142, 255, 0.20),
    inset 0 0 60px rgba(0,0,0,0.4),
    inset 0 1px 0 rgba(255,255,255,0.25);
  animation: breathe 3.5s ease-in-out infinite, orbFloat 6s ease-in-out infinite,
             listenPulse 0.9s ease-in-out infinite;
}

/* SPEAKING — warm purple-blue aurora */
.orb.speaking {
  box-shadow:
    0 0 80px  rgba(162, 89, 255, 0.55),
    0 0 160px rgba(58, 142, 255, 0.35),
    0 0 240px rgba(0, 229, 255, 0.20),
    inset 0 0 60px rgba(0,0,0,0.4),
    inset 0 1px 0 rgba(255,255,255,0.25);
  animation: breathe 3.5s ease-in-out infinite, orbFloat 6s ease-in-out infinite;
}

/* ERROR */
.orb.error {
  box-shadow:
    0 0 80px  rgba(255, 60, 80, 0.45),
    0 0 160px rgba(255, 60, 80, 0.20),
    inset 0 0 60px rgba(0,0,0,0.5),
    inset 0 1px 0 rgba(255,255,255,0.12);
  animation: breathe 3.5s ease-in-out infinite, orbFloat 6s ease-in-out infinite, errorShake 0.4s ease;
}

/* ── Animações da orb ──────────────────── */
@keyframes breathe {
  0%, 100% { transform: scale(1); }
  50%       { transform: scale(1.055); }
}

@keyframes orbFloat {
  0%, 100% { margin-top: 0px; }
  25%       { margin-top: -14px; }
  75%       { margin-top: 14px; }
}

@keyframes listenPulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.80; }
}

@keyframes errorShake {
  0%   { transform: translateX(0); }
  20%  { transform: translateX(-6px); }
  40%  { transform: translateX(6px); }
  60%  { transform: translateX(-4px); }
  80%  { transform: translateX(4px); }
  100% { transform: translateX(0); }
}

/* ── Canvas inside orb (aurora) ──────────── */
.orb-canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border-radius: 50%;
  opacity: 0.9;
  mix-blend-mode: screen;
}

/* ── Glass highlight (top-left sheen) ────── */
.glass-highlight {
  position: absolute;
  top: 8%;
  left: 10%;
  width: 42%;
  height: 36%;
  border-radius: 50%;
  background: radial-gradient(
    ellipse at 40% 35%,
    rgba(255, 255, 255, 0.38) 0%,
    rgba(255, 255, 255, 0.10) 50%,
    transparent 75%
  );
  pointer-events: none;
  transform: rotate(-20deg);
}

/* ── Glass rim (bottom glint) ────────────── */
.glass-rim {
  position: absolute;
  bottom: 6%;
  right: 8%;
  width: 28%;
  height: 14%;
  border-radius: 50%;
  background: radial-gradient(
    ellipse,
    rgba(180, 220, 255, 0.18) 0%,
    transparent 70%
  );
  pointer-events: none;
}

/* ── Status text ─────────────────────────── */
.status {
  font-size: clamp(11px, 1.8vw, 14px);
  font-weight: 400;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--white-dim);
  text-align: center;
  max-width: 340px;
  line-height: 1.5;
  transition: color 0.4s ease, opacity 0.4s ease;
  pointer-events: none;
}

/* ── Transcript text ─────────────────────── */
.transcript {
  font-size: clamp(13px, 2.2vw, 16px);
  font-weight: 300;
  color: rgba(232, 240, 255, 0.70);
  text-align: center;
  max-width: 520px;
  line-height: 1.65;
  min-height: 1.65em;
  padding: 0 24px;
  transition: opacity 0.5s ease;
  pointer-events: none;
}

/* ── Responsive ──────────────────────────── */
@media (max-width: 480px) {
  .scene { gap: 24px; }
}

/* ── Reduced motion ──────────────────────── */
@media (prefers-reduced-motion: reduce) {
  .orb, .halo, .ambient-blob {
    animation: none !important;
  }
}

/* ── API Key button ───────────────────────── */
.key-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.10);
  background: rgba(255,255,255,0.05);
  color: rgba(255,255,255,0.30);
  font-size: 16px;
  cursor: pointer;
  transition: all 0.2s ease;
  backdrop-filter: blur(8px);
  z-index: 10;
}
.key-btn:hover {
  background: rgba(255,255,255,0.10);
  color: rgba(255,255,255,0.70);
  border-color: rgba(255,255,255,0.22);
}

</style>
</head>
<body>
<!-- Ambient glow background -->
  <div class="ambient">
    <div class="ambient-blob blob-1"></div>
    <div class="ambient-blob blob-2"></div>
    <div class="ambient-blob blob-3"></div>
  </div>

  <!-- Main scene -->
  <main class="scene">

    <!-- Orb container (click to listen) -->
    <div class="orb-scene" id="orbScene" role="button" aria-label="Ativar ORION" tabindex="0">

      <!-- Outer glow halo -->
      <div class="halo" id="halo"></div>

      <!-- Liquid Glass orb -->
      <div class="orb" id="orb">

        <!-- Inner light sweep (Siri-like aurora) -->
        <canvas class="orb-canvas" id="orbCanvas"></canvas>

        <!-- Glass reflection highlight -->
        <div class="glass-highlight"></div>
        <div class="glass-rim"></div>

      </div>

    </div>

    <!-- Status text -->
    <p class="status" id="status">Toque para ativar</p>

    <!-- Transcript text -->
    <p class="transcript" id="transcript"></p>

  </main>

  <!-- API key reset (canto inferior direito, discreto) -->
  <button class="key-btn" id="keyBtn" title="Alterar Blackbox API Key">⚙</button>

  <script>
/* =============================================
   ORION V2 — script.js
   Liquid Glass AI Assistant
   Fases: 1 Orb · 2 Escuta · 3 Transcrição · 4 Voz
   ============================================= */


/* ─────────────────────────────────────────────
   FASE 1 — AURORA ORB (Canvas)
   Renderiza a aurora Siri-like dentro da orb
   ───────────────────────────────────────────── */

const orbCanvas = document.getElementById('orbCanvas');
const ctx       = orbCanvas.getContext('2d');
const orb       = document.getElementById('orb');

// Resize canvas to match orb dimensions
function resizeCanvas() {
  const size = orb.offsetWidth;
  orbCanvas.width  = size;
  orbCanvas.height = size;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// Aurora blobs que fluem dentro da orb — mais rápidos e com mais drift
const auroraBlobs = [
  { x: 0.45, y: 0.55, r: 0.40, hue: 210, speed: 0.0014, angle: 0,    drift: 0.22 },
  { x: 0.55, y: 0.42, r: 0.32, hue: 270, speed: 0.0020, angle: 2.1,  drift: 0.18 },
  { x: 0.40, y: 0.60, r: 0.27, hue: 185, speed: 0.0017, angle: 4.2,  drift: 0.15 },
  { x: 0.60, y: 0.50, r: 0.22, hue: 230, speed: 0.0023, angle: 1.0,  drift: 0.12 },
  { x: 0.50, y: 0.45, r: 0.18, hue: 300, speed: 0.0025, angle: 3.3,  drift: 0.10 },
];

// Reactive amplitude — increases when listening/speaking
let auroraAmplitude = 1.0;
let targetAmplitude = 1.0;

function drawAurora(ts) {
  const W = orbCanvas.width;
  const H = orbCanvas.height;
  const R = W / 2;

  ctx.clearRect(0, 0, W, H);

  // Clip to circle
  ctx.save();
  ctx.beginPath();
  ctx.arc(R, R, R - 1, 0, Math.PI * 2);
  ctx.clip();

  // Deep background inside orb
  const bg = ctx.createRadialGradient(R * 0.9, R * 0.7, 0, R, R, R);
  bg.addColorStop(0, 'rgba(40, 80, 160, 0.35)');
  bg.addColorStop(1, 'rgba(5, 5, 18, 0.80)');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Ease amplitude toward target
  auroraAmplitude += (targetAmplitude - auroraAmplitude) * 0.05;

  // Draw each aurora blob
  auroraBlobs.forEach(blob => {
    blob.angle += blob.speed;

    const cx = (blob.x + Math.cos(blob.angle) * blob.drift) * W;
    const cy = (blob.y + Math.sin(blob.angle * 1.3) * blob.drift) * H;
    const radius = blob.r * W * auroraAmplitude;

    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
    grad.addColorStop(0,   `hsla(${blob.hue}, 90%, 72%, 0.60)`);
    grad.addColorStop(0.5, `hsla(${blob.hue + 25}, 80%, 55%, 0.25)`);
    grad.addColorStop(1,   'transparent');

    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.fill();

    // Slowly shift hue for organic feel
    blob.hue = (blob.hue + 0.09) % 360;
  });

  // Vignette overlay — keeps edges dark (glass depth)
  const vig = ctx.createRadialGradient(R, R, R * 0.4, R, R, R);
  vig.addColorStop(0, 'transparent');
  vig.addColorStop(1, 'rgba(0, 0, 8, 0.65)');
  ctx.fillStyle = vig;
  ctx.beginPath();
  ctx.arc(R, R, R - 1, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();

  requestAnimationFrame(drawAurora);
}

requestAnimationFrame(drawAurora);


/* ─────────────────────────────────────────────
   ESTADO — controla aparência da orb e textos
   ───────────────────────────────────────────── */

const statusEl    = document.getElementById('status');
const transcriptEl = document.getElementById('transcript');
const halo        = document.getElementById('halo');

const STATES = {
  idle:      { cls: '',          status: 'Toque para ativar',    amplitude: 1.0 },
  listening: { cls: 'listening', status: 'Ouvindo…',             amplitude: 1.60 },
  thinking:  { cls: 'listening', status: 'Processando…',         amplitude: 1.35 },
  speaking:  { cls: 'speaking',  status: 'Falando…',             amplitude: 1.50 },
  error:     { cls: 'error',     status: 'Não consegui ouvir.',   amplitude: 0.9  },
};

let currentState = 'idle';

function setState(name) {
  const state = STATES[name] || STATES.idle;
  currentState = name;

  // Swap CSS state class on orb
  orb.classList.remove('listening', 'speaking', 'error');
  if (state.cls) orb.classList.add(state.cls);

  // Drive aurora intensity
  targetAmplitude = state.amplitude;

  // Update status label
  statusEl.textContent = state.status;
}


/* ─────────────────────────────────────────────
   FASE 2 — WEB SPEECH API (Reconhecimento de voz)
   ───────────────────────────────────────────── */

const SpeechRecognition =
  window.SpeechRecognition || window.webkitSpeechRecognition;

let recognition = null;
let isListening  = false;

if (SpeechRecognition) {

  recognition = new SpeechRecognition();
  recognition.lang            = 'pt-BR';
  recognition.interimResults  = true;
  recognition.continuous      = false;

  // Escuta iniciada
  recognition.onstart = () => {
    isListening = true;
    setState('listening');
    transcriptEl.textContent = '';
  };

  // Erro de reconhecimento
  recognition.onerror = (e) => {
    console.warn('Speech error:', e.error);
    isListening = false;
    setState('error');
    transcriptEl.textContent = '';
    setTimeout(() => setState('idle'), 2200);
  };

  // Reconhecimento encerrado sem resultado (silêncio)
  recognition.onend = () => {
    if (isListening) {
      isListening = false;
      if (currentState === 'listening') {
        setState('idle');
        transcriptEl.textContent = '';
      }
    }
  };

  /* ── FASE 3 — Transcrição ───────────────── */
  recognition.onresult = (event) => {
    let interim = '';
    let final   = '';

    for (let i = event.resultIndex; i < event.results.length; i++) {
      const text = event.results[i][0].transcript;
      if (event.results[i].isFinal) final += text;
      else interim += text;
    }

    // Mostra texto em tempo real
    transcriptEl.textContent = final || interim;

    // Quando resultado final chega → responde
    if (final.trim()) {
      isListening = false;
      setState('thinking');
      setTimeout(() => responder(final.trim()), 300);
    }
  };

} else {
  statusEl.textContent = 'Navegador não suporta voz';
}


/* ─────────────────────────────────────────────
   FASE 4 — SPEECH SYNTHESIS (Voz de resposta)
   ───────────────────────────────────────────── */

const synth = window.speechSynthesis;

function falar(texto) {
  synth.cancel();

  const utterance      = new SpeechSynthesisUtterance(texto);
  utterance.lang       = 'pt-BR';
  utterance.rate       = 0.95;
  utterance.pitch      = 1.0;
  utterance.volume     = 1.0;

  const voices = synth.getVoices();
  const ptVoice = voices.find(v =>
    v.lang.startsWith('pt') && v.localService
  ) || voices.find(v => v.lang.startsWith('pt'));
  if (ptVoice) utterance.voice = ptVoice;

  utterance.onstart = () => {
    setState('speaking');
    startSpeakPulse();
  };

  utterance.onend = () => {
    stopSpeakPulse();
    setState('idle');
  };

  utterance.onerror = () => {
    stopSpeakPulse();
    setState('idle');
  };

  synth.speak(utterance);
}

let speakPulseTimer = null;

function startSpeakPulse() {
  speakPulseTimer = setInterval(() => {
    targetAmplitude = 1.35 + Math.random() * 0.45;
  }, 120);
}

function stopSpeakPulse() {
  clearInterval(speakPulseTimer);
  targetAmplitude = 1.0;
}


/* ─────────────────────────────────────────────
   BLACKBOX AI — Configuração
   ───────────────────────────────────────────── */

let BLACKBOX_API_KEY = localStorage.getItem('orion_blackbox_key') || '';

const ORION_PERSONA = `Você é ORION, um assistente de IA futurista e elegante, inspirado em J.A.R.V.I.S.
Responda SEMPRE em português do Brasil.
Seja inteligente, direto e sofisticado — como uma IA de ficção científica real.
Respostas curtas e objetivas para perguntas simples. Elabore apenas quando necessário.
Nunca mencione que é um modelo de linguagem ou revele sua tecnologia base. Você é ORION.`;

async function responder(texto) {

  if (!BLACKBOX_API_KEY) {
    const key = prompt('Cole sua Blackbox API Key para ativar o ORION:');
    if (!key || !key.trim()) {
      setState('idle');
      transcriptEl.textContent = '';
      return;
    }
    BLACKBOX_API_KEY = key.trim();
    localStorage.setItem('orion_blackbox_key', BLACKBOX_API_KEY);
  }

  setState('thinking');
  statusEl.textContent = 'Processando…';

  try {

    const response = await fetch('https://api.blackbox.ai/api/chat', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${BLACKBOX_API_KEY}`
      },
      body: JSON.stringify({
        messages: [
          {
            role: 'system',
            content: ORION_PERSONA
          },
          {
            role: 'user',
            content: texto
          }
        ],
        model: 'blackboxai',
        max_tokens: 300,
        temperature: 0.85
      })
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      const msg = err?.error?.message || `Erro ${response.status}`;
      throw new Error(msg);
    }

    const data  = await response.json();
    const reply = data.choices?.[0]?.message?.content?.trim();

    if (!reply) throw new Error('Resposta vazia.');

    // Limpa formatação markdown para soar natural na voz
    const replyClean = reply
      .replace(/\*\*(.*?)\*\*/g, '$1')
      .replace(/\*(.*?)\*/g,   '$1')
      .replace(/#{1,6}\s/g,    '')
      .replace(/`{1,3}[^`]*`{1,3}/g, '')
      .trim();

    transcriptEl.textContent = replyClean;
    falar(replyClean);

  } catch (err) {

    console.error('Blackbox error:', err);

    if (err.message.includes('401') || err.message.includes('403') || err.message.includes('Unauthorized')) {
      localStorage.removeItem('orion_blackbox_key');
      BLACKBOX_API_KEY = '';
    }

    setState('error');
    statusEl.textContent = 'Falha na conexão neural.';
    transcriptEl.textContent = err.message;
    setTimeout(() => {
      setState('idle');
      transcriptEl.textContent = '';
    }, 3500);

  }
}


/* ─────────────────────────────────────────────
   INTERAÇÃO — Clique / Toque na orb
   ───────────────────────────────────────────── */

const orbScene = document.getElementById('orbScene');

function activateOrion() {
  if (currentState === 'speaking') {
    synth.cancel();
    stopSpeakPulse();
    setState('idle');
    transcriptEl.textContent = '';
    return;
  }

  if (isListening && recognition) {
    recognition.stop();
    return;
  }

  if (recognition) {
    orb.classList.add('pressed');
    setTimeout(() => orb.classList.remove('pressed'), 220);
    recognition.start();
  } else {
    setState('error');
    statusEl.textContent = 'Voz não disponível neste navegador.';
    setTimeout(() => setState('idle'), 3000);
  }
}

orbScene.addEventListener('click',      activateOrion);
orbScene.addEventListener('touchstart', (e) => { e.preventDefault(); activateOrion(); }, { passive: false });

orbScene.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' || e.key === ' ') {
    e.preventDefault();
    activateOrion();
  }
});

if (synth.onvoiceschanged !== undefined) {
  synth.onvoiceschanged = () => {};
}


/* ─────────────────────────────────────────────
   BOTÃO — Trocar API Key
   ───────────────────────────────────────────── */

document.getElementById('keyBtn').addEventListener('click', () => {
  const key = prompt('Cole sua nova Blackbox API Key:');
  if (key && key.trim()) {
    BLACKBOX_API_KEY = key.trim();
    localStorage.setItem('orion_blackbox_key', BLACKBOX_API_KEY);
    statusEl.textContent = 'API Key atualizada.';
    setTimeout(() => setState('idle'), 2000);
  }
});
