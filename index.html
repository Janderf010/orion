<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORION V2</title>
<link rel="icon" type="image/png" href="favicon.png">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --black:     #000000;
  --blue:      #3a8eff;
  --cyan:      #00e5ff;
  --purple:    #a259ff;
  --white:     #e8f0ff;
  --white-dim: rgba(232,240,255,0.45);
  --orb-size:  clamp(180px, 36vmin, 300px);
  --halo-size: calc(var(--orb-size) * 2.1);
  --font-ui:   -apple-system,'SF Pro Display','Helvetica Neue',sans-serif;
}

body {
  background: var(--black);
  height: 100dvh;
  width: 100vw;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: var(--font-ui);
  color: var(--white);
  -webkit-font-smoothing: antialiased;
  touch-action: none;
}

/* ── Ambient bg ── */
.ambient { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
.ambient-blob {
  position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.08;
  animation: blobDrift 22s ease-in-out infinite alternate;
}
.blob-1 { width: 60vw; height: 60vw; background: var(--blue);   top: -20%; left: -15%; animation-delay: 0s; }
.blob-2 { width: 45vw; height: 45vw; background: var(--purple); bottom:-15%; right:-10%; animation-delay:-8s; }
.blob-3 { width: 32vw; height: 32vw; background: var(--cyan);   top: 38%; left: 52%; animation-delay:-15s; }
@keyframes blobDrift {
  from { transform: translate(0,0) scale(1); }
  to   { transform: translate(5%,8%) scale(1.10); }
}

/* ── Scene ── */
.scene {
  position: relative; z-index: 1;
  display: flex; flex-direction: column; align-items: center;
  gap: 36px; user-select: none;
}

/* ── Orb wrapper ── */
.orb-scene {
  position: relative;
  width: var(--halo-size);
  height: var(--halo-size);
  display: flex; justify-content: center; align-items: center;
  cursor: pointer; outline: none;
}

/* ── Multi-ring halo system ── */
.halo-ring {
  position: absolute; border-radius: 50%;
  border: 1px solid transparent;
  animation: haloSpin linear infinite;
  pointer-events: none;
}
.halo-ring-1 {
  width: var(--halo-size); height: var(--halo-size);
  border-image: none;
  background: conic-gradient(from 0deg,
    transparent 0%, rgba(58,142,255,0.20) 20%,
    rgba(162,89,255,0.25) 45%, rgba(0,229,255,0.20) 65%,
    transparent 85%) border-box;
  -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 1px), #fff calc(100% - 1px));
  mask: radial-gradient(farthest-side, transparent calc(100% - 1px), #fff calc(100% - 1px));
  animation-duration: 7s;
}
.halo-ring-2 {
  width: calc(var(--halo-size) * 0.88); height: calc(var(--halo-size) * 0.88);
  background: conic-gradient(from 180deg,
    transparent 0%, rgba(0,229,255,0.12) 30%,
    rgba(58,142,255,0.15) 60%, transparent 80%) border-box;
  -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 1px), #fff calc(100% - 1px));
  mask: radial-gradient(farthest-side, transparent calc(100% - 1px), #fff calc(100% - 1px));
  animation-duration: 11s; animation-direction: reverse; opacity: 0.6;
}
.halo-ring-3 {
  width: calc(var(--halo-size) * 0.76); height: calc(var(--halo-size) * 0.76);
  background: conic-gradient(from 90deg,
    transparent 0%, rgba(162,89,255,0.10) 40%,
    rgba(0,229,255,0.08) 70%, transparent 90%) border-box;
  -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 1px), #fff calc(100% - 1px));
  mask: radial-gradient(farthest-side, transparent calc(100% - 1px), #fff calc(100% - 1px));
  animation-duration: 15s; opacity: 0.4;
}
@keyframes haloSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

/* ── Orb core ── */
.orb {
  position: relative;
  width: var(--orb-size); height: var(--orb-size);
  border-radius: 50%; cursor: pointer; overflow: hidden;
  background: radial-gradient(
    circle at 35% 30%,
    rgba(255,255,255,0.18) 0%,
    rgba(100,160,255,0.10) 28%,
    rgba(60,90,200,0.07) 55%,
    rgba(5,5,22,0.70) 100%
  );
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow:
    0 0 50px  rgba(58,142,255,0.28),
    0 0 100px rgba(162,89,255,0.16),
    0 0 180px rgba(0,229,255,0.10),
    inset 0 0 70px rgba(0,0,0,0.55),
    inset 0 1px 0 rgba(255,255,255,0.16);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  animation: orbFloat 7s ease-in-out infinite, breathe 4s ease-in-out infinite;
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.5s ease;
  will-change: transform;
}

.orb-scene:hover .orb { transform: scale(1.04); }
.orb.pressed          { transform: scale(1.12) !important; transition: transform 0.15s ease; }

/* ── State: listening ── */
.orb.listening {
  box-shadow:
    0 0 70px  rgba(0,229,255,0.60),
    0 0 140px rgba(0,229,255,0.32),
    0 0 220px rgba(58,142,255,0.18),
    inset 0 0 60px rgba(0,0,0,0.40),
    inset 0 1px 0 rgba(255,255,255,0.24);
  animation: orbFloat 7s ease-in-out infinite, breathe 4s ease-in-out infinite, listenRing 1.1s ease-in-out infinite;
}
/* ── State: thinking ── */
.orb.thinking {
  box-shadow:
    0 0 60px  rgba(162,89,255,0.40),
    0 0 120px rgba(58,142,255,0.25),
    0 0 200px rgba(0,229,255,0.12),
    inset 0 0 60px rgba(0,0,0,0.45),
    inset 0 1px 0 rgba(255,255,255,0.20);
  animation: orbFloat 7s ease-in-out infinite, breathe 4s ease-in-out infinite;
}
/* ── State: speaking ── */
.orb.speaking {
  box-shadow:
    0 0 80px  rgba(162,89,255,0.60),
    0 0 160px rgba(58,142,255,0.38),
    0 0 240px rgba(0,229,255,0.22),
    inset 0 0 55px rgba(0,0,0,0.38),
    inset 0 1px 0 rgba(255,255,255,0.28);
  animation: orbFloat 7s ease-in-out infinite, breatheSpeaking 0.28s ease-in-out infinite;
}
/* ── State: error ── */
.orb.error {
  box-shadow:
    0 0 70px  rgba(255,55,75,0.50),
    0 0 140px rgba(255,55,75,0.22),
    inset 0 0 60px rgba(0,0,0,0.52),
    inset 0 1px 0 rgba(255,255,255,0.10);
  animation: orbFloat 7s ease-in-out infinite, breathe 4s ease-in-out infinite, errorShake 0.45s ease;
}

@keyframes breathe {
  0%,100% { transform: scale(1); }
  50%      { transform: scale(1.045); }
}
@keyframes breatheSpeaking {
  0%,100% { transform: scale(1); }
  50%      { transform: scale(1.035); }
}
@keyframes orbFloat {
  0%,100% { margin-top: 0px; }
  25%      { margin-top: -16px; }
  75%      { margin-top: 16px; }
}
@keyframes listenRing {
  0%,100% { opacity: 1; }
  50%      { opacity: 0.78; }
}
@keyframes errorShake {
  0%   { transform: translateX(0); }
  20%  { transform: translateX(-7px); }
  40%  { transform: translateX(7px); }
  60%  { transform: translateX(-4px); }
  80%  { transform: translateX(4px); }
  100% { transform: translateX(0); }
}

/* ── Canvas aurora ── */
.orb-canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  border-radius: 50%;
  opacity: 0.92;
  mix-blend-mode: screen;
}

/* ── Liquid glass highlights ── */
.glass-highlight {
  position: absolute; top: 7%; left: 9%;
  width: 44%; height: 38%;
  border-radius: 50%;
  background: radial-gradient(
    ellipse at 38% 32%,
    rgba(255,255,255,0.36) 0%,
    rgba(200,230,255,0.12) 45%,
    transparent 72%
  );
  pointer-events: none;
  transform: rotate(-22deg);
}
.glass-rim {
  position: absolute; bottom: 5%; right: 7%;
  width: 30%; height: 16%;
  border-radius: 50%;
  background: radial-gradient(
    ellipse,
    rgba(160,210,255,0.16) 0%,
    transparent 68%
  );
  pointer-events: none;
}
.glass-side {
  position: absolute; top: 32%; left: 3%;
  width: 10%; height: 28%;
  border-radius: 50%;
  background: radial-gradient(
    ellipse,
    rgba(255,255,255,0.10) 0%,
    transparent 70%
  );
  pointer-events: none;
}

/* ── Ripple ring on listening ── */
.ripple-ring {
  position: absolute;
  border-radius: 50%;
  border: 1px solid rgba(0,229,255,0.35);
  animation: rippleExpand 2s ease-out infinite;
  pointer-events: none;
  opacity: 0;
}
.ripple-ring:nth-child(1) { animation-delay: 0s; }
.ripple-ring:nth-child(2) { animation-delay: 0.7s; }
.ripple-ring:nth-child(3) { animation-delay: 1.4s; }
@keyframes rippleExpand {
  0%   { width: var(--orb-size); height: var(--orb-size); opacity: 0.55; }
  100% { width: calc(var(--orb-size) * 1.8); height: calc(var(--orb-size) * 1.8); opacity: 0; }
}
.ripple-rings { display: none; }
.orb.listening ~ .ripple-rings,
.orb-scene.active-listen .ripple-rings { display: block; }

/* ── Status label ── */
.status {
  font-size: clamp(10px, 1.6vw, 13px);
  font-weight: 300;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--white-dim);
  text-align: center;
  line-height: 1.5;
  transition: color 0.4s ease, opacity 0.4s ease;
  pointer-events: none;
}

/* ── Name label ── */
.orion-name {
  position: fixed; top: 32px; left: 50%; transform: translateX(-50%);
  font-size: clamp(11px, 1.5vw, 13px);
  font-weight: 200;
  letter-spacing: 0.55em;
  text-transform: uppercase;
  color: rgba(232,240,255,0.20);
  pointer-events: none;
  z-index: 2;
}

/* ── Mic level visualizer (small bars around orb) ── */
.mic-bars {
  position: absolute;
  width: calc(var(--orb-size) + 28px);
  height: calc(var(--orb-size) + 28px);
  border-radius: 50%;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.4s ease;
}
.mic-bars.active { opacity: 1; }
.mic-bar {
  position: absolute;
  bottom: 50%;
  left: 50%;
  width: 2px;
  background: rgba(0,229,255,0.55);
  border-radius: 1px;
  transform-origin: bottom center;
  transition: height 0.08s ease;
}

/* ── Settings button ── */
.key-btn {
  position: fixed; bottom: 22px; right: 22px;
  width: 34px; height: 34px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.04);
  color: rgba(255,255,255,0.22);
  font-size: 15px; cursor: pointer;
  transition: all 0.2s ease;
  backdrop-filter: blur(8px);
  z-index: 10;
}
.key-btn:hover {
  background: rgba(255,255,255,0.09);
  color: rgba(255,255,255,0.60);
  border-color: rgba(255,255,255,0.18);
}

/* ── Transcript pill (subtle, fades) ── */
.transcript-pill {
  position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
  max-width: min(520px, 88vw);
  font-size: clamp(12px, 2vw, 15px);
  font-weight: 300;
  color: rgba(232,240,255,0.60);
  text-align: center;
  line-height: 1.6;
  padding: 10px 22px;
  border-radius: 30px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  backdrop-filter: blur(12px);
  min-height: 42px;
  transition: opacity 0.5s ease;
  opacity: 0;
  pointer-events: none;
  z-index: 5;
}
.transcript-pill.visible { opacity: 1; }

@media (max-width: 480px) { .scene { gap: 22px; } }
@media (prefers-reduced-motion: reduce) {
  .orb, .halo-ring, .ambient-blob, .ripple-ring { animation: none !important; }
}
</style>
</head>
<body>

<div class="ambient">
  <div class="ambient-blob blob-1"></div>
  <div class="ambient-blob blob-2"></div>
  <div class="ambient-blob blob-3"></div>
</div>

<p class="orion-name">Orion</p>

<main class="scene">
  <div class="orb-scene" id="orbScene" role="button" aria-label="Ativar ORION" tabindex="0">

    <!-- Halo rings -->
    <div class="halo-ring halo-ring-1"></div>
    <div class="halo-ring halo-ring-2"></div>
    <div class="halo-ring halo-ring-3"></div>

    <!-- Orb -->
    <div class="orb" id="orb">
      <canvas class="orb-canvas" id="orbCanvas"></canvas>
      <div class="glass-highlight"></div>
      <div class="glass-rim"></div>
      <div class="glass-side"></div>
    </div>

    <!-- Ripple rings (listening state) -->
    <div class="ripple-rings" id="rippleRings">
      <div class="ripple-ring"></div>
      <div class="ripple-ring"></div>
      <div class="ripple-ring"></div>
    </div>

    <!-- Mic bar visualizer -->
    <div class="mic-bars" id="micBars"></div>

  </div>

  <p class="status" id="status">Toque para ativar</p>
</main>

<div class="transcript-pill" id="transcript"></div>
<button class="key-btn" id="keyBtn" title="Alterar API Key">⚙</button>

<script>
/* ── AURORA ORB ── */
const orbCanvas = document.getElementById('orbCanvas');
const ctx       = orbCanvas.getContext('2d');
const orb       = document.getElementById('orb');

function resizeCanvas() {
  const s = orb.offsetWidth;
  orbCanvas.width = s; orbCanvas.height = s;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const auroraBlobs = [
  { x:0.45, y:0.55, r:0.42, hue:210, speed:0.0013, angle:0,    drift:0.24 },
  { x:0.55, y:0.40, r:0.34, hue:265, speed:0.0019, angle:2.1,  drift:0.20 },
  { x:0.38, y:0.62, r:0.28, hue:188, speed:0.0016, angle:4.2,  drift:0.16 },
  { x:0.62, y:0.48, r:0.23, hue:230, speed:0.0022, angle:1.0,  drift:0.13 },
  { x:0.50, y:0.42, r:0.19, hue:295, speed:0.0024, angle:3.3,  drift:0.11 },
  { x:0.30, y:0.50, r:0.15, hue:170, speed:0.0028, angle:5.1,  drift:0.09 },
];

let auroraAmplitude = 1.0;
let targetAmplitude = 1.0;
let auroraSpeed     = 1.0;
let targetSpeed     = 1.0;

function drawAurora(ts) {
  const W = orbCanvas.width;
  const H = orbCanvas.height;
  const R = W / 2;

  ctx.clearRect(0, 0, W, H);
  ctx.save();
  ctx.beginPath();
  ctx.arc(R, R, R - 1, 0, Math.PI * 2);
  ctx.clip();

  const bg = ctx.createRadialGradient(R * 0.85, R * 0.65, 0, R, R, R);
  bg.addColorStop(0, 'rgba(30,60,140,0.40)');
  bg.addColorStop(0.5, 'rgba(10,15,50,0.60)');
  bg.addColorStop(1, 'rgba(2,2,12,0.85)');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  auroraAmplitude += (targetAmplitude - auroraAmplitude) * 0.04;
  auroraSpeed     += (targetSpeed     - auroraSpeed)     * 0.04;

  auroraBlobs.forEach(blob => {
    blob.angle += blob.speed * auroraSpeed;
    const cx = (blob.x + Math.cos(blob.angle) * blob.drift) * W;
    const cy = (blob.y + Math.sin(blob.angle * 1.3) * blob.drift) * H;
    const radius = blob.r * W * auroraAmplitude;
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
    grad.addColorStop(0,   `hsla(${blob.hue}, 88%, 70%, 0.62)`);
    grad.addColorStop(0.45, `hsla(${blob.hue + 22}, 78%, 54%, 0.28)`);
    grad.addColorStop(1,   'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.fill();
    blob.hue = (blob.hue + 0.07) % 360;
  });

  /* speaking deformation — organic morphing */
  if (currentState === 'speaking') {
    const t2 = ts * 0.002;
    for (let i = 0; i < 3; i++) {
      const angle = t2 * (1.2 + i * 0.4) + i * 2.1;
      const ox = R + Math.cos(angle) * R * 0.22;
      const oy = R + Math.sin(angle * 1.4) * R * 0.22;
      const r2 = R * (0.18 + speakIntensity * 0.10);
      const gd = ctx.createRadialGradient(ox, oy, 0, ox, oy, r2);
      const hue = 220 + i * 40 + Math.sin(t2) * 20;
      gd.addColorStop(0, `hsla(${hue}, 95%, 72%, ${0.45 + speakIntensity * 0.25})`);
      gd.addColorStop(1, 'transparent');
      ctx.fillStyle = gd;
      ctx.beginPath();
      ctx.arc(ox, oy, r2, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  /* thinking spiral */
  if (currentState === 'thinking') {
    const t3 = ts * 0.0012;
    for (let i = 0; i < 5; i++) {
      const a = t3 * (0.8 + i * 0.3) + i * 1.257;
      const dist = R * (0.10 + i * 0.06);
      const ox = R + Math.cos(a) * dist;
      const oy = R + Math.sin(a) * dist;
      const gr = ctx.createRadialGradient(ox, oy, 0, ox, oy, R * 0.09);
      gr.addColorStop(0, `hsla(${260 + i*18}, 90%, 72%, 0.50)`);
      gr.addColorStop(1, 'transparent');
      ctx.fillStyle = gr;
      ctx.beginPath();
      ctx.arc(ox, oy, R * 0.09, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  const vig = ctx.createRadialGradient(R, R, R * 0.38, R, R, R);
  vig.addColorStop(0, 'transparent');
  vig.addColorStop(1, 'rgba(0,0,10,0.70)');
  ctx.fillStyle = vig;
  ctx.beginPath();
  ctx.arc(R, R, R - 1, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
  requestAnimationFrame(drawAurora);
}
requestAnimationFrame(drawAurora);


/* ── MIC BARS ── */
const micBarsEl  = document.getElementById('micBars');
const BAR_COUNT  = 24;
const micBarEls  = [];
let   micStream  = null;
let   micAnalyser = null;
let   micData    = null;
let   micRaf     = null;

for (let i = 0; i < BAR_COUNT; i++) {
  const bar = document.createElement('div');
  bar.className = 'mic-bar';
  const angle = (i / BAR_COUNT) * 360;
  const orbR  = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--orb-size')) || 220;
  bar.style.transform = `rotate(${angle}deg) translateX(-50%)`;
  bar.style.height    = '6px';
  micBarsEl.appendChild(bar);
  micBarEls.push(bar);
}

function startMicVisualizer(stream) {
  const AudioContext = window.AudioContext || window.webkitAudioContext;
  if (!AudioContext) return;
  const actx = new AudioContext();
  const src   = actx.createMediaStreamSource(stream);
  micAnalyser = actx.createAnalyser();
  micAnalyser.fftSize = 64;
  src.connect(micAnalyser);
  micData = new Uint8Array(micAnalyser.frequencyBinCount);
  micBarsEl.classList.add('active');

  function draw() {
    micRaf = requestAnimationFrame(draw);
    micAnalyser.getByteFrequencyData(micData);
    micBarEls.forEach((bar, i) => {
      const idx = Math.floor(i * micData.length / BAR_COUNT);
      const val = micData[idx] / 255;
      bar.style.height = (6 + val * 22) + 'px';
      bar.style.opacity = 0.3 + val * 0.7;
    });
  }
  draw();
}

function stopMicVisualizer() {
  cancelAnimationFrame(micRaf);
  micBarsEl.classList.remove('active');
  micBarEls.forEach(b => { b.style.height = '6px'; b.style.opacity = '0.3'; });
  if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
}


/* ── STATE ── */
const statusEl     = document.getElementById('status');
const transcriptEl = document.getElementById('transcript');
const orbScene     = document.getElementById('orbScene');
const rippleRings  = document.getElementById('rippleRings');

const STATES = {
  idle:      { cls:'',          status:'Toque para ativar',   amplitude:1.0,  speed:1.0  },
  listening: { cls:'listening', status:'Ouvindo…',            amplitude:1.55, speed:1.35 },
  thinking:  { cls:'thinking',  status:'Processando…',        amplitude:1.30, speed:1.80 },
  speaking:  { cls:'speaking',  status:'',                    amplitude:1.45, speed:1.60 },
  error:     { cls:'error',     status:'Não consegui ouvir.', amplitude:0.88, speed:0.80 },
};

let currentState = 'idle';

function setState(name) {
  const state = STATES[name] || STATES.idle;
  currentState = name;
  orb.classList.remove('listening','thinking','speaking','error');
  if (state.cls) orb.classList.add(state.cls);
  targetAmplitude = state.amplitude;
  targetSpeed     = state.speed;
  if (state.status) statusEl.textContent = state.status;
  /* ripple rings */
  rippleRings.style.display = name === 'listening' ? 'block' : 'none';
}


/* ── SPEECH RECOGNITION ── */
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let isListening  = false;

if (SpeechRecognition) {
  recognition = new SpeechRecognition();
  recognition.lang           = 'pt-BR';
  recognition.interimResults = true;
  recognition.continuous     = false;

  recognition.onstart = () => {
    isListening = true;
    setState('listening');
    setTranscript('', false);
    navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
      micStream = stream;
      startMicVisualizer(stream);
    }).catch(() => {});
  };

  recognition.onerror = (e) => {
    console.warn('Speech error:', e.error);
    isListening = false;
    stopMicVisualizer();
    setState('error');
    setTranscript('', false);
    setTimeout(() => setState('idle'), 2500);
  };

  recognition.onend = () => {
    stopMicVisualizer();
    if (isListening) {
      isListening = false;
      if (currentState === 'listening') {
        setState('idle');
        setTranscript('', false);
      }
    }
  };

  recognition.onresult = (event) => {
    let interim = '';
    let final   = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const text = event.results[i][0].transcript;
      if (event.results[i].isFinal) final += text;
      else interim += text;
    }
    setTranscript(final || interim, true);
    if (final.trim()) {
      isListening = false;
      stopMicVisualizer();
      setState('thinking');
      setTimeout(() => responder(final.trim()), 300);
    }
  };
} else {
  statusEl.textContent = 'Navegador não suporta voz';
}

function setTranscript(text, visible) {
  transcriptEl.textContent = text;
  if (visible && text) transcriptEl.classList.add('visible');
  else transcriptEl.classList.remove('visible');
}


/* ── SPEECH SYNTHESIS ── */
const synth = window.speechSynthesis;
let speakIntensity = 0;
let speakPulseTimer = null;

function falar(texto) {
  synth.cancel();
  const utterance    = new SpeechSynthesisUtterance(texto);
  utterance.lang     = 'pt-BR';
  utterance.rate     = 0.95;
  utterance.pitch    = 1.0;
  utterance.volume   = 1.0;
  const voices = synth.getVoices();
  const ptVoice = voices.find(v => v.lang.startsWith('pt') && v.localService)
               || voices.find(v => v.lang.startsWith('pt'));
  if (ptVoice) utterance.voice = ptVoice;

  utterance.onstart = () => {
    setState('speaking');
    statusEl.textContent = '';
    startSpeakPulse();
  };
  utterance.onend = () => {
    stopSpeakPulse();
    setTranscript('', false);
    setState('idle');
  };
  utterance.onerror = () => {
    stopSpeakPulse();
    setTranscript('', false);
    setState('idle');
  };
  synth.speak(utterance);
}

function startSpeakPulse() {
  speakPulseTimer = setInterval(() => {
    speakIntensity = 0.5 + Math.random() * 0.5;
    targetAmplitude = 1.30 + speakIntensity * 0.28;
  }, 100);
}
function stopSpeakPulse() {
  clearInterval(speakPulseTimer);
  speakIntensity = 0;
  targetAmplitude = 1.0;
}


/* ── ANTHROPIC ── */
let ANTHROPIC_API_KEY = localStorage.getItem('orion_anthropic_key') || '';

const ORION_PERSONA = `Você é ORION, um assistente de IA futurista e elegante, inspirado em J.A.R.V.I.S.
Responda SEMPRE em português do Brasil.
Seja inteligente, direto e sofisticado — como uma IA de ficção científica real.
Respostas curtas e objetivas para perguntas simples. Elabore apenas quando necessário.
Nunca diga que é Claude ou mencione a Anthropic. Você é ORION.`;

async function responder(texto) {
  if (!ANTHROPIC_API_KEY) {
    const key = prompt('Cole sua Anthropic API Key para ativar o ORION:');
    if (!key?.trim()) { setState('idle'); return; }
    ANTHROPIC_API_KEY = key.trim();
    localStorage.setItem('orion_anthropic_key', ANTHROPIC_API_KEY);
  }

  setState('thinking');

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': ANTHROPIC_API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 300,
        system: ORION_PERSONA,
        messages: [{ role:'user', content: texto }]
      })
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err?.error?.message || `Erro ${response.status}`);
    }

    const data  = await response.json();
    const reply = data.content?.[0]?.text?.trim();
    if (!reply) throw new Error('Resposta vazia.');

    const clean = reply
      .replace(/\*\*(.*?)\*\*/g, '$1')
      .replace(/\*(.*?)\*/g,     '$1')
      .replace(/#{1,6}\s/g,      '')
      .replace(/`{1,3}[^`]*`{1,3}/g, '')
      .trim();

    setTranscript(clean, true);
    falar(clean);

  } catch (err) {
    console.error('Anthropic error:', err);
    if (/401|403|authentication/i.test(err.message)) {
      localStorage.removeItem('orion_anthropic_key');
      ANTHROPIC_API_KEY = '';
    }
    setState('error');
    statusEl.textContent = 'Falha na conexão neural.';
    setTranscript(err.message, true);
    setTimeout(() => { setState('idle'); setTranscript('', false); }, 3800);
  }
}


/* ── INTERACTION ── */
function activateOrion() {
  if (currentState === 'speaking') {
    synth.cancel();
    stopSpeakPulse();
    setTranscript('', false);
    setState('idle');
    return;
  }
  if (isListening && recognition) {
    recognition.stop();
    return;
  }
  if (recognition) {
    orb.classList.add('pressed');
    setTimeout(() => orb.classList.remove('pressed'), 180);
    recognition.start();
  } else {
    setState('error');
    statusEl.textContent = 'Voz não disponível neste navegador.';
    setTimeout(() => setState('idle'), 3000);
  }
}

orbScene.addEventListener('click', activateOrion);
orbScene.addEventListener('touchstart', (e) => { e.preventDefault(); activateOrion(); }, { passive: false });
orbScene.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); activateOrion(); }
});

if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = () => {};

document.getElementById('keyBtn').addEventListener('click', () => {
  const key = prompt('Cole sua nova Anthropic API Key:');
  if (key?.trim()) {
    ANTHROPIC_API_KEY = key.trim();
    localStorage.setItem('orion_anthropic_key', ANTHROPIC_API_KEY);
    statusEl.textContent = 'API Key atualizada.';
    setTimeout(() => setState('idle'), 2000);
  }
});
</script>
