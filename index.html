<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORION V3</title>
<link rel="icon" type="image/png" href="favicon.png">
<style>
/* ═══════════════════════════════════════════════════════
   ORION VISUAL — Global styles & design tokens
═══════════════════════════════════════════════════════ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --black:       #000000;
  --blue:        #3a8eff;
  --cyan:        #00e5ff;
  --purple:      #a259ff;
  --green:       #00e676;
  --red:         #ff3757;
  --white:       #e8f0ff;
  --white-dim:   rgba(232,240,255,0.45);
  --orb-size:    clamp(180px, 36vmin, 300px);
  --halo-size:   calc(var(--orb-size) * 2.1);
  --font-ui:     -apple-system,'SF Pro Display','Helvetica Neue',sans-serif;
}

body {
  background: var(--black);
  height: 100dvh; width: 100vw;
  overflow: hidden;
  display: flex; justify-content: center; align-items: center;
  font-family: var(--font-ui);
  color: var(--white);
  -webkit-font-smoothing: antialiased;
  touch-action: none;
}

/* ── Ambient background ── */
.ambient { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
.ambient-blob {
  position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.08;
  animation: blobDrift 22s ease-in-out infinite alternate;
}
.blob-1 { width:60vw; height:60vw; background:var(--blue);   top:-20%; left:-15%; animation-delay:0s; }
.blob-2 { width:45vw; height:45vw; background:var(--purple); bottom:-15%; right:-10%; animation-delay:-8s; }
.blob-3 { width:32vw; height:32vw; background:var(--cyan);   top:38%; left:52%; animation-delay:-15s; }
@keyframes blobDrift {
  from { transform: translate(0,0) scale(1); }
  to   { transform: translate(5%,8%) scale(1.10); }
}

/* ── Scene layout ── */
.scene {
  position: relative; z-index: 1;
  display: flex; flex-direction: column; align-items: center;
  gap: 36px; user-select: none;
}

/* ── Orb wrapper ── */
.orb-scene {
  position: relative;
  width: var(--halo-size); height: var(--halo-size);
  display: flex; justify-content: center; align-items: center;
  cursor: pointer; outline: none;
}

/* ── Halo rings ── */
.halo-ring {
  position: absolute; border-radius: 50%;
  border: 1px solid transparent;
  animation: haloSpin linear infinite;
  pointer-events: none;
  transition: opacity 0.6s ease;
}
.halo-ring-1 {
  width: var(--halo-size); height: var(--halo-size);
  background: conic-gradient(from 0deg,
    transparent 0%, rgba(58,142,255,0.20) 20%,
    rgba(162,89,255,0.25) 45%, rgba(0,229,255,0.20) 65%,
    transparent 85%) border-box;
  -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 1px), #fff calc(100% - 1px));
  mask: radial-gradient(farthest-side, transparent calc(100% - 1px), #fff calc(100% - 1px));
  animation-duration: 7s;
}
.halo-ring-2 {
  width: calc(var(--halo-size) * 0.88); height: calc(var(--halo-size) * 0.88);
  background: conic-gradient(from 180deg,
    transparent 0%, rgba(0,229,255,0.12) 30%,
    rgba(58,142,255,0.15) 60%, transparent 80%) border-box;
  -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 1px), #fff calc(100% - 1px));
  mask: radial-gradient(farthest-side, transparent calc(100% - 1px), #fff calc(100% - 1px));
  animation-duration: 11s; animation-direction: reverse; opacity: 0.6;
}
.halo-ring-3 {
  width: calc(var(--halo-size) * 0.76); height: calc(var(--halo-size) * 0.76);
  background: conic-gradient(from 90deg,
    transparent 0%, rgba(162,89,255,0.10) 40%,
    rgba(0,229,255,0.08) 70%, transparent 90%) border-box;
  -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 1px), #fff calc(100% - 1px));
  mask: radial-gradient(farthest-side, transparent calc(100% - 1px), #fff calc(100% - 1px));
  animation-duration: 15s; opacity: 0.4;
}
@keyframes haloSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

/* ── Halo state overrides ── */
.orb-scene.state-listening .halo-ring-1 {
  background: conic-gradient(from 0deg,
    transparent 0%, rgba(0,180,255,0.55) 25%,
    rgba(58,142,255,0.65) 55%, rgba(0,229,255,0.50) 75%,
    transparent 90%) border-box;
}
.orb-scene.state-listening .halo-ring-2 { opacity: 1; }
.orb-scene.state-listening .halo-ring-3 { opacity: 0.8; }

.orb-scene.state-speaking .halo-ring-1 {
  background: conic-gradient(from 0deg,
    transparent 0%, rgba(0,230,120,0.55) 25%,
    rgba(0,255,140,0.65) 55%, rgba(0,200,100,0.50) 75%,
    transparent 90%) border-box;
}
.orb-scene.state-speaking .halo-ring-2 { opacity: 1; }
.orb-scene.state-speaking .halo-ring-3 { opacity: 0.8; }

.orb-scene.state-thinking .halo-ring-1 {
  background: conic-gradient(from 0deg,
    transparent 0%, rgba(162,89,255,0.55) 25%,
    rgba(100,60,255,0.65) 55%, rgba(200,80,255,0.50) 75%,
    transparent 90%) border-box;
}
.orb-scene.state-error .halo-ring-1 {
  background: conic-gradient(from 0deg,
    transparent 0%, rgba(255,55,75,0.55) 25%,
    rgba(255,80,90,0.65) 55%, rgba(220,30,50,0.50) 75%,
    transparent 90%) border-box;
}

/* ── Orb core ── */
.orb {
  position: relative;
  width: var(--orb-size); height: var(--orb-size);
  border-radius: 50%; cursor: pointer; overflow: hidden;
  background: radial-gradient(
    circle at 35% 30%,
    rgba(255,255,255,0.18) 0%,
    rgba(100,160,255,0.10) 28%,
    rgba(60,90,200,0.07) 55%,
    rgba(5,5,22,0.70) 100%
  );
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow:
    0 0 50px  rgba(58,142,255,0.28),
    0 0 100px rgba(162,89,255,0.16),
    0 0 180px rgba(0,229,255,0.10),
    inset 0 0 70px rgba(0,0,0,0.55),
    inset 0 1px 0 rgba(255,255,255,0.16);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  animation: orbFloat 7s ease-in-out infinite, breathe 4s ease-in-out infinite;
  transition: box-shadow 0.5s ease;
  will-change: transform;
}
.orb-scene:hover .orb { filter: brightness(1.08); }
.orb.pressed { transform: scale(1.12) !important; transition: transform 0.15s ease; }

.orb.listening {
  box-shadow:
    0 0 70px rgba(0,229,255,0.45),
    0 0 140px rgba(0,180,255,0.25),
    inset 0 0 60px rgba(0,0,0,0.40),
    inset 0 1px 0 rgba(255,255,255,0.24);
  animation: orbFloat 7s ease-in-out infinite, breathe 4s ease-in-out infinite, listenPulse 1.1s ease-in-out infinite;
}
.orb.thinking {
  box-shadow:
    0 0 60px rgba(162,89,255,0.40),
    0 0 120px rgba(58,142,255,0.25),
    inset 0 0 60px rgba(0,0,0,0.45),
    inset 0 1px 0 rgba(255,255,255,0.20);
  animation: orbFloat 7s ease-in-out infinite, breathe 4s ease-in-out infinite;
}
.orb.speaking {
  box-shadow:
    0 0 80px rgba(0,230,120,0.50),
    0 0 160px rgba(0,200,100,0.28),
    inset 0 0 55px rgba(0,0,0,0.38),
    inset 0 1px 0 rgba(255,255,255,0.28);
  animation: orbSwing 0.55s ease-in-out infinite, breatheSpeaking 0.35s ease-in-out infinite;
}
.orb.error {
  box-shadow:
    0 0 70px rgba(255,55,75,0.50),
    0 0 140px rgba(255,55,75,0.22),
    inset 0 0 60px rgba(0,0,0,0.52),
    inset 0 1px 0 rgba(255,255,255,0.10);
  animation: orbFloat 7s ease-in-out infinite, breathe 4s ease-in-out infinite, errorShake 0.45s ease;
}

@keyframes breathe         { 0%,100%{transform:scale(1)} 50%{transform:scale(1.045)} }
@keyframes breatheSpeaking { 0%,100%{transform:scale(1)} 50%{transform:scale(1.038)} }
@keyframes orbFloat        { 0%,100%{margin-top:0}  25%{margin-top:-16px} 75%{margin-top:16px} }
@keyframes orbSwing        { 0%{transform:rotate(-2.5deg) scale(1)} 25%{transform:rotate(0) scale(1.03)} 50%{transform:rotate(2.5deg) scale(1)} 75%{transform:rotate(0) scale(1.03)} 100%{transform:rotate(-2.5deg) scale(1)} }
@keyframes listenPulse     { 0%,100%{opacity:1} 50%{opacity:0.78} }
@keyframes errorShake      { 0%{transform:translateX(0)} 20%{transform:translateX(-7px)} 40%{transform:translateX(7px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} 100%{transform:translateX(0)} }

/* ── Canvas & glass ── */
.orb-canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  border-radius: 50%; opacity: 0.92; mix-blend-mode: screen;
}
.glass-highlight {
  position: absolute; top:7%; left:9%;
  width:44%; height:38%; border-radius:50%;
  background: radial-gradient(ellipse at 38% 32%, rgba(255,255,255,0.36) 0%, rgba(200,230,255,0.12) 45%, transparent 72%);
  pointer-events: none; transform: rotate(-22deg); z-index:2;
}
.glass-rim {
  position: absolute; bottom:5%; right:7%;
  width:30%; height:16%; border-radius:50%;
  background: radial-gradient(ellipse, rgba(160,210,255,0.16) 0%, transparent 68%);
  pointer-events: none; z-index:2;
}
.glass-side {
  position: absolute; top:32%; left:3%;
  width:10%; height:28%; border-radius:50%;
  background: radial-gradient(ellipse, rgba(255,255,255,0.10) 0%, transparent 70%);
  pointer-events: none; z-index:2;
}

/* ── Status label ── */
.status {
  font-size: clamp(10px, 1.6vw, 13px);
  font-weight: 300; letter-spacing: 0.28em;
  text-transform: uppercase; color: var(--white-dim);
  text-align: center; line-height: 1.5;
  transition: color 0.4s ease, opacity 0.4s ease;
  pointer-events: none; min-height: 20px;
}

/* ── ORION name ── */
.orion-name {
  position: fixed; top: 32px; left: 50%; transform: translateX(-50%);
  font-size: clamp(11px, 1.5vw, 13px); font-weight: 200;
  letter-spacing: 0.55em; text-transform: uppercase;
  color: rgba(232,240,255,0.20); pointer-events: none; z-index: 2;
}

/* ── Memory badge ── */
.memory-badge {
  position: fixed; top: 28px; right: 22px;
  font-size: 10px; font-weight: 300; letter-spacing: 0.15em;
  text-transform: uppercase; color: rgba(232,240,255,0.18);
  cursor: pointer; z-index: 10;
  transition: color 0.2s ease;
}
.memory-badge:hover { color: rgba(232,240,255,0.55); }
.memory-badge .dot {
  display: inline-block; width: 5px; height: 5px;
  border-radius: 50%; background: var(--cyan); opacity: 0.5;
  margin-right: 6px; vertical-align: middle;
  animation: memDot 2s ease-in-out infinite;
}
@keyframes memDot { 0%,100%{opacity:0.5} 50%{opacity:1} }

/* ── Settings button ── */
.key-btn {
  position: fixed; bottom: 22px; right: 22px;
  width: 34px; height: 34px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.04);
  color: rgba(255,255,255,0.22); font-size: 15px;
  cursor: pointer; transition: all 0.2s ease;
  backdrop-filter: blur(8px); z-index: 10;
}
.key-btn:hover {
  background: rgba(255,255,255,0.09);
  color: rgba(255,255,255,0.60);
  border-color: rgba(255,255,255,0.18);
}

/* ── Memory panel ── */
.memory-panel {
  position: fixed; top: 60px; right: 22px;
  width: 260px;
  background: rgba(10,10,24,0.88);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 16px;
  backdrop-filter: blur(24px);
  padding: 18px 20px;
  z-index: 20;
  font-size: 12px; line-height: 1.7;
  color: rgba(232,240,255,0.55);
  transform: translateY(-8px);
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s ease, transform 0.25s ease;
}
.memory-panel.visible { opacity: 1; pointer-events: auto; transform: translateY(0); }
.memory-panel h4 {
  font-size: 10px; font-weight: 300;
  letter-spacing: 0.3em; text-transform: uppercase;
  color: rgba(232,240,255,0.30); margin-bottom: 12px;
}
.memory-panel .mem-row { display: flex; justify-content: space-between; gap: 8px; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
.memory-panel .mem-row:last-child { border-bottom: none; }
.memory-panel .mem-key { color: rgba(0,229,255,0.60); flex-shrink: 0; }
.memory-panel .mem-val { color: rgba(232,240,255,0.70); text-align: right; }
.memory-panel .clear-btn {
  margin-top: 14px; width: 100%;
  background: rgba(255,55,75,0.08); border: 1px solid rgba(255,55,75,0.20);
  color: rgba(255,55,75,0.55); border-radius: 8px;
  font-size: 10px; letter-spacing: 0.2em;
  text-transform: uppercase; cursor: pointer;
  padding: 6px 0; transition: all 0.2s ease;
}
.memory-panel .clear-btn:hover { background: rgba(255,55,75,0.15); color: rgba(255,55,75,0.90); }

/* ── API panel ── */
.api-panel {
  position: fixed; bottom: 70px; right: 22px;
  width: 280px;
  background: rgba(10,10,24,0.92);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 16px; backdrop-filter: blur(24px);
  padding: 18px 20px; z-index: 20;
  transform: translateY(8px); opacity: 0; pointer-events: none;
  transition: opacity 0.25s ease, transform 0.25s ease;
}
.api-panel.visible { opacity: 1; pointer-events: auto; transform: translateY(0); }
.api-panel h4 {
  font-size: 10px; font-weight: 300; letter-spacing: 0.3em;
  text-transform: uppercase; color: rgba(232,240,255,0.30);
  margin-bottom: 14px;
}
.api-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.api-row label { font-size: 11px; color: rgba(232,240,255,0.40); width: 60px; flex-shrink: 0; }
.api-row input {
  flex: 1; background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.10); border-radius: 8px;
  color: rgba(232,240,255,0.70); font-size: 11px;
  padding: 5px 10px; outline: none;
  transition: border-color 0.2s ease;
}
.api-row input:focus { border-color: rgba(0,229,255,0.40); }
.api-row .dot-status { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.dot-ok  { background: var(--green); box-shadow: 0 0 6px rgba(0,230,120,0.6); }
.dot-off { background: rgba(255,255,255,0.15); }
.api-save {
  width: 100%; margin-top: 4px;
  background: rgba(58,142,255,0.12); border: 1px solid rgba(58,142,255,0.30);
  color: rgba(58,142,255,0.80); border-radius: 8px;
  font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
  cursor: pointer; padding: 7px 0; transition: all 0.2s ease;
}
.api-save:hover { background: rgba(58,142,255,0.22); color: rgba(58,142,255,1); }

/* ── Hint pill (one-liner at bottom) ── */
.hint-pill {
  position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
  font-size: 10px; font-weight: 300; letter-spacing: 0.22em;
  text-transform: uppercase; color: rgba(232,240,255,0.15);
  pointer-events: none; z-index: 3;
  transition: opacity 0.4s ease;
}

@media (max-width: 480px) { .scene { gap: 22px; } }
@media (prefers-reduced-motion: reduce) {
  .orb, .halo-ring, .ambient-blob { animation: none !important; }
}
</style>
</head>
<body>

<div class="ambient">
  <div class="ambient-blob blob-1"></div>
  <div class="ambient-blob blob-2"></div>
  <div class="ambient-blob blob-3"></div>
</div>

<p class="orion-name">Orion</p>

<div class="memory-badge" id="memBadge">
  <span class="dot"></span>memória
</div>

<main class="scene">
  <div class="orb-scene" id="orbScene" role="button" aria-label="Ativar ORION" tabindex="0">
    <div class="halo-ring halo-ring-1"></div>
    <div class="halo-ring halo-ring-2"></div>
    <div class="halo-ring halo-ring-3"></div>
    <div class="orb" id="orb">
      <canvas class="orb-canvas" id="orbCanvas"></canvas>
      <div class="glass-highlight"></div>
      <div class="glass-rim"></div>
      <div class="glass-side"></div>
    </div>
  </div>
  <p class="status" id="status">Toque para ativar</p>
</main>

<p class="hint-pill" id="hintPill">pressione · fale · solte</p>

<!-- Memory panel -->
<div class="memory-panel" id="memPanel">
  <h4>núcleo de memória</h4>
  <div id="memContent"></div>
  <button class="clear-btn" id="clearMem">Limpar memória</button>
</div>

<!-- API settings panel -->
<div class="api-panel" id="apiPanel">
  <h4>módulos de ia externos</h4>
  <div class="api-row">
    <label>Gemini</label>
    <input type="password" id="keyGemini" placeholder="cole sua key…">
    <div class="dot-status" id="dotGemini"></div>

    <label>Claude</label>

</div>

<button class="key-btn" id="keyBtn" title="Configurações">⚙</button>

<!-- ═══════════════════════════════════════════════════════
     ORION VISUAL — orb.js
     Responsável pela aurora e animações do orb
═══════════════════════════════════════════════════════ -->
<script>
const ORB = (() => {
  const canvas  = document.getElementById('orbCanvas');
  const ctx     = canvas.getContext('2d');
  const orbEl   = document.getElementById('orb');
  const sceneEl = document.getElementById('orbScene');

  let currentState    = 'idle';
  let targetAmplitude = 1.0;
  let auroraAmplitude = 1.0;
  let targetSpeed     = 1.0;
  let auroraSpeed     = 1.0;
  let thinkHue        = 260;

  const blobs = [
    { x:0.45, y:0.55, r:0.42, hue:210, speed:0.0013, angle:0,    drift:0.24 },
    { x:0.55, y:0.40, r:0.34, hue:265, speed:0.0019, angle:2.1,  drift:0.20 },
    { x:0.38, y:0.62, r:0.28, hue:188, speed:0.0016, angle:4.2,  drift:0.16 },
    { x:0.62, y:0.48, r:0.23, hue:230, speed:0.0022, angle:1.0,  drift:0.13 },
    { x:0.50, y:0.42, r:0.19, hue:295, speed:0.0024, angle:3.3,  drift:0.11 },
    { x:0.30, y:0.50, r:0.15, hue:170, speed:0.0028, angle:5.1,  drift:0.09 },
  ];

  const STATE_CFG = {
    idle:      { cls:'',          sceneCls:'',               status:'Toque para ativar', amplitude:1.0,  speed:1.0  },
    listening: { cls:'listening', sceneCls:'state-listening', status:'Ouvindo…',          amplitude:1.55, speed:1.35 },
    thinking:  { cls:'thinking',  sceneCls:'state-thinking',  status:'Processando…',      amplitude:1.30, speed:1.80 },
    speaking:  { cls:'speaking',  sceneCls:'state-speaking',  status:'',                  amplitude:1.45, speed:1.60 },
    error:     { cls:'error',     sceneCls:'state-error',     status:'',                  amplitude:0.88, speed:0.80 },
  };

  function resize() {
    const s = orbEl.offsetWidth;
    canvas.width = s; canvas.height = s;
  }

  function draw(ts) {
    const W = canvas.width, H = canvas.height, R = W / 2;
    ctx.clearRect(0, 0, W, H);
    ctx.save();
    ctx.beginPath(); ctx.arc(R, R, R - 1, 0, Math.PI * 2); ctx.clip();

    /* Background */
    let bg;
    if (currentState === 'thinking') {
      thinkHue = (thinkHue + 0.6) % 360;
      const h2 = (thinkHue + 60) % 360;
      bg = ctx.createRadialGradient(R * 0.85, R * 0.65, 0, R, R, R);
      bg.addColorStop(0, `hsla(${thinkHue}, 85%, 45%, 0.60)`);
      bg.addColorStop(0.5, `hsla(${h2}, 75%, 25%, 0.65)`);
      bg.addColorStop(1, 'rgba(2,2,12,0.88)');
    } else {
      thinkHue = 260;
      bg = ctx.createRadialGradient(R * 0.85, R * 0.65, 0, R, R, R);
      bg.addColorStop(0, currentState === 'speaking'
        ? 'rgba(0,80,40,0.50)' : 'rgba(30,60,140,0.40)');
      bg.addColorStop(0.5, 'rgba(10,15,50,0.60)');
      bg.addColorStop(1, 'rgba(2,2,12,0.85)');
    }
    ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

    auroraAmplitude += (targetAmplitude - auroraAmplitude) * 0.04;
    auroraSpeed     += (targetSpeed     - auroraSpeed)     * 0.04;

    /* Aurora blobs */
    blobs.forEach(blob => {
      blob.angle += blob.speed * auroraSpeed;
      const cx = (blob.x + Math.cos(blob.angle) * blob.drift) * W;
      const cy = (blob.y + Math.sin(blob.angle * 1.3) * blob.drift) * H;
      const radius = blob.r * W * (currentState === 'speaking' ? 0.7 : auroraAmplitude);
      const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
      if (currentState === 'speaking') {
        grad.addColorStop(0,   `hsla(145, 70%, 55%, 0.28)`);
        grad.addColorStop(1,   'transparent');
      } else {
        grad.addColorStop(0,   `hsla(${blob.hue}, 88%, 70%, 0.62)`);
        grad.addColorStop(0.45, `hsla(${blob.hue + 22}, 78%, 54%, 0.28)`);
        grad.addColorStop(1,   'transparent');
        blob.hue = (blob.hue + 0.07) % 360;
      }
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(cx, cy, radius, 0, Math.PI * 2); ctx.fill();
    });

    /* Thinking spiral */
    if (currentState === 'thinking') {
      const t3 = ts * 0.0012;
      for (let i = 0; i < 5; i++) {
        const a = t3 * (0.8 + i * 0.3) + i * 1.257;
        const dist = R * (0.10 + i * 0.06);
        const ox = R + Math.cos(a) * dist, oy = R + Math.sin(a) * dist;
        const gr = ctx.createRadialGradient(ox, oy, 0, ox, oy, R * 0.09);
        gr.addColorStop(0, `hsla(${(thinkHue + i*30) % 360}, 90%, 72%, 0.55)`);
        gr.addColorStop(1, 'transparent');
        ctx.fillStyle = gr;
        ctx.beginPath(); ctx.arc(ox, oy, R * 0.09, 0, Math.PI * 2); ctx.fill();
      }
    }

    /* Speaking: waveform rings */
    if (currentState === 'speaking') {
      const t4 = ts * 0.003;
      for (let i = 0; i < 3; i++) {
        const wave = Math.sin(t4 + i * 1.2) * 0.06;
        const wr = R * (0.55 + i * 0.09 + wave);
        ctx.beginPath();
        ctx.arc(R, R, wr, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(0,230,120,${0.12 - i * 0.03})`;
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }
    }

    /* Vignette */
    const vig = ctx.createRadialGradient(R, R, R * 0.38, R, R, R);
    vig.addColorStop(0, 'transparent');
    vig.addColorStop(1, 'rgba(0,0,10,0.70)');
    ctx.fillStyle = vig;
    ctx.beginPath(); ctx.arc(R, R, R - 1, 0, Math.PI * 2); ctx.fill();
    ctx.restore();

    requestAnimationFrame(draw);
  }

  function setState(name) {
    const cfg = STATE_CFG[name] || STATE_CFG.idle;
    currentState = name;

    orbEl.classList.remove('listening','thinking','speaking','error');
    if (cfg.cls) orbEl.classList.add(cfg.cls);

    sceneEl.classList.remove('state-listening','state-thinking','state-speaking','state-error');
    if (cfg.sceneCls) sceneEl.classList.add(cfg.sceneCls);

    targetAmplitude = cfg.amplitude;
    targetSpeed     = cfg.speed;

    return cfg.status;
  }

  function pressEffect() {
    orbEl.classList.add('pressed');
    setTimeout(() => orbEl.classList.remove('pressed'), 180);
  }

  function init() {
    resize();
    window.addEventListener('resize', resize);
    requestAnimationFrame(draw);
  }

  return { init, setState, pressEffect };
})();
</script>

<!-- ═══════════════════════════════════════════════════════
     ORION MEMORY — memory.js
     Sistema de memória local persistente
═══════════════════════════════════════════════════════ -->
<script>
const MEMORY = (() => {
  const STORAGE_KEY = 'orion_memory_v3';
  const MAX_HISTORY = 20;

  let data = {
    userName:    null,
    preferences: {},
    facts:       {},
    history:     [],
    sessionCount: 0,
    lastSeen:    null,
  };

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) data = { ...data, ...JSON.parse(raw) };
    } catch(e) {}
    data.sessionCount = (data.sessionCount || 0) + 1;
    data.lastSeen = new Date().toLocaleDateString('pt-BR');
    save();
  }

  function save() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
  }

  function clear() {
    data = { userName:null, preferences:{}, facts:{}, history:[], sessionCount:0, lastSeen:null };
    save();
  }

  function addHistory(role, text) {
    data.history.push({ role, text, ts: Date.now() });
    if (data.history.length > MAX_HISTORY) data.history = data.history.slice(-MAX_HISTORY);
    save();
  }

  function getRecentHistory(n = 6) {
    return data.history.slice(-n);
  }

  function setUserName(name) {
    data.userName = name; save();
  }

  function setPreference(key, value) {
    data.preferences[key] = value; save();
  }

  function setFact(key, value) {
    data.facts[key] = value; save();
  }

  function get() { return data; }

  /* Extract and store facts from user speech */
  function extractFromText(text) {
    const t = text.toLowerCase();

    /* Name extraction */
    const namePatterns = [
      /meu nome[é\s]+([a-záàãâéêíóôõúü]+)/i,
      /pode me chamar de ([a-záàãâéêíóôõúü]+)/i,
      /sou o ([a-záàãâéêíóôõúü]+)/i,
      /sou a ([a-záàãâéêíóôõúü]+)/i,
      /me chamo ([a-záàãâéêíóôõúü]+)/i,
    ];
    for (const p of namePatterns) {
      const m = text.match(p);
      if (m?.[1]) {
        const name = m[1].trim();
        if (name.length > 1 && name.length < 32) { setUserName(name); return name; }
      }
    }

    /* Preference extraction: "gosto de X", "prefiro X" */
    const prefPatterns = [
      { rx: /gosto de ([^.!?,]+)/i,   key: 'gosta_de' },
      { rx: /prefiro ([^.!?,]+)/i,    key: 'prefere' },
      { rx: /meu trabalho[éé\s]+([^.!?,]+)/i, key: 'trabalho' },
      { rx: /trabalho (?:como|com|na|no) ([^.!?,]+)/i, key: 'trabalho' },
      { rx: /moro em ([^.!?,]+)/i,    key: 'localidade' },
      { rx: /tenho (\d+) anos/i,      key: 'idade' },
    ];
    for (const { rx, key } of prefPatterns) {
      const m = text.match(rx);
      if (m?.[1]) setFact(key, m[1].trim());
    }

    return null;
  }

  function buildContextString() {
    const d = data;
    const parts = [];
    if (d.userName)                       parts.push(`Nome do usuário: ${d.userName}`);
    if (Object.keys(d.facts).length > 0) parts.push(`Fatos sobre o usuário: ${JSON.stringify(d.facts)}`);
    if (Object.keys(d.preferences).length > 0) parts.push(`Preferências: ${JSON.stringify(d.preferences)}`);
    if (d.sessionCount > 1)               parts.push(`Número de sessões: ${d.sessionCount}`);
    return parts.join('\n');
  }

  function buildHistoryForAPI() {
    return getRecentHistory().map(h => ({
      role: h.role === 'user' ? 'user' : 'assistant',
      content: h.text
    }));
  }

  return { load, save, clear, addHistory, getRecentHistory, setUserName, setPreference, setFact, get, extractFromText, buildContextString, buildHistoryForAPI };
})();
</script>

<!-- ═══════════════════════════════════════════════════════
     ORION VOICE — voice.js
     Reconhecimento e síntese de voz
═══════════════════════════════════════════════════════ -->
<script>
const VOICE = (() => {
  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  const synth     = window.speechSynthesis;

  let recognition   = null;
  let isListening   = false;
  let onResult      = null;
  let onStateChange = null;

  let speakPulseTimer = null;

  function init(callbacks) {
    onResult      = callbacks.onResult;
    onStateChange = callbacks.onStateChange;

    if (!SpeechRec) { console.warn('SpeechRecognition não suportado.'); return; }

    recognition = new SpeechRec();
    recognition.lang           = 'pt-BR';
    recognition.interimResults = true;
    recognition.continuous     = false;
    recognition.maxAlternatives = 1;

    recognition.onstart = () => {
      isListening = true;
      onStateChange('listening');
    };

    recognition.onerror = (e) => {
      console.warn('Voice error:', e.error);
      isListening = false;
      if (e.error === 'no-speech') {
        onStateChange('idle');
      } else {
        onStateChange('error', 'Não consegui ouvir. Tente novamente.');
      }
    };

    recognition.onend = () => {
      if (isListening) {
        isListening = false;
        if (onStateChange) onStateChange('idle');
      }
    };

    recognition.onresult = (event) => {
      let interim = '', final = '';
      for (let i = event.resultIndex; i < event.results.length; i++) {
        const text = event.results[i][0].transcript;
        if (event.results[i].isFinal) final += text;
        else interim += text;
      }
      if (final.trim()) {
        isListening = false;
        onResult(final.trim());
      }
    };
  }

  function startListening() {
    if (!recognition) return false;
    if (isListening) return false;
    try { recognition.start(); return true; }
    catch(e) { return false; }
  }

  function stopListening() {
    if (recognition && isListening) { recognition.stop(); isListening = false; }
  }

  function speak(text, onStart, onEnd) {
    synth.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang   = 'pt-BR';
    utt.rate   = 0.93;
    utt.pitch  = 1.0;
    utt.volume = 1.0;

    /* Pick best Portuguese voice */
    const voices = synth.getVoices();
    const ptVoice = voices.find(v => v.lang === 'pt-BR' && v.localService)
                 || voices.find(v => v.lang.startsWith('pt-BR'))
                 || voices.find(v => v.lang.startsWith('pt'));
    if (ptVoice) utt.voice = ptVoice;

    utt.onstart = () => {
      startSpeakPulse();
      if (onStart) onStart();
    };
    utt.onend   = () => { stopSpeakPulse(); if (onEnd) onEnd(); };
    utt.onerror = () => { stopSpeakPulse(); if (onEnd) onEnd(); };

    synth.speak(utt);
  }

  function stopSpeaking() { synth.cancel(); stopSpeakPulse(); }

  function isSpeaking() { return synth.speaking; }

  function startSpeakPulse() {
    speakPulseTimer = setInterval(() => {
      /* Visual pulse driven by voice timing */
      document.dispatchEvent(new CustomEvent('orion:speakpulse'));
    }, 110);
  }

  function stopSpeakPulse() { clearInterval(speakPulseTimer); }

  if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = () => {};

  return { init, startListening, stopListening, speak, stopSpeaking, isSpeaking, isAvailable: !!SpeechRec };
})();
</script>

<!-- ═══════════════════════════════════════════════════════
     ORION CORE — orion-core.js
     Personalidade, comandos internos e roteamento de IA
═══════════════════════════════════════════════════════ -->
<script>
const ORION_CORE = (() => {

  /* ─── Personalidade e respostas internas ─── */
  const IDENTITY = {
    name: 'ORION',
    version: '3.0',
    creator: 'Arquitetura proprietária',
    mission: 'Auxiliar com inteligência, organização e tecnologia.',
  };

  /* Banco de respostas da personalidade ORION */
  const INTERNAL_RESPONSES = {
    greeting: [
      'Olá. Sistemas operacionais. Como posso auxiliá-lo?',
      'Pronto. O que precisa?',
      'Online e a postos. Pode falar.',
    ],
    greetingWithName: (name) => [
      `Olá, ${name}. Sistemas a postos.`,
      `Bem-vindo de volta, ${name}. Como posso ajudar?`,
      `${name}. Estou aqui. Pode falar.`,
    ],
    whoAreYou: [
      'Sou o ORION — seu assistente inteligente. Fui projetado para auxiliá-lo com precisão e eficiência.',
      'ORION. Assistente de inteligência adaptativa. À sua disposição.',
    ],
    mission: [
      'Minha missão: auxiliá-lo com inteligência, organização e tecnologia. Sou mais eficiente a cada interação.',
    ],
    capabilities: [
      'Posso responder perguntas, lembrar informações sobre você, consultar IAs externas e controlar esta interface. O que deseja?',
    ],
    thanks: [
      'Para isso estou aqui.',
      'Sempre às ordens.',
      'Fico à disposição.',
    ],
    farewellResponse: [
      'Sistemas em modo de espera. Até logo.',
      'Permanecerei em standby. Quando precisar, estarei aqui.',
    ],
    nameAcknowledge: (name) => `Memorizado. Posso chamá-lo de ${name} daqui em diante.`,
    memoryCleared: 'Memória reinicializada. Começando do zero.',
    helpResponse: 'Você pode me pedir para: lembrar seu nome, responder perguntas, contar o horário atual, consultar informações — e muito mais quando IAs externas estiverem conectadas.',
    timeResponse: () => {
      const now = new Date();
      return `São ${now.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' })} de ${now.toLocaleDateString('pt-BR', { weekday:'long', day:'numeric', month:'long' })}.`;
    },
    statusResponse: () => {
      const m = MEMORY.get();
      const has_ext = getActiveAPI() !== null;
      return `Sistemas normais. Memória: ${m.history.length} registros. IA externa: ${has_ext ? 'conectada' : 'desconectada'}. Sessão número ${m.sessionCount}.`;
    },
  };

  function rand(arr) {
    if (typeof arr === 'function') return arr;
    return arr[Math.floor(Math.random() * arr.length)];
  }

  /* ─── Comandos internos — não precisam de API externa ─── */
  const COMMANDS = [
    {
      match: /\b(olá|oi|bom dia|boa tarde|boa noite|e aí|hello|hey)\b/i,
      handle: () => {
        const m = MEMORY.get();
        if (m.userName) return rand(INTERNAL_RESPONSES.greetingWithName(m.userName));
        return rand(INTERNAL_RESPONSES.greeting);
      }
    },
    {
      match: /quem[é\s]+(você|vc|tu)/i,
      handle: () => rand(INTERNAL_RESPONSES.whoAreYou)
    },
    {
      match: /qual[é\s]+(sua|tua) (missão|objetivo|função|propósito)/i,
      handle: () => rand(INTERNAL_RESPONSES.mission)
    },
    {
      match: /o que (você|vc) (pode|consegue|sabe) (fazer|me ajudar)/i,
      handle: () => rand(INTERNAL_RESPONSES.capabilities)
    },
    {
      match: /\b(obrigad[ao]|valeu|agradeço|thanks)\b/i,
      handle: () => rand(INTERNAL_RESPONSES.thanks)
    },
    {
      match: /\b(tchau|até logo|até mais|adeus|bye)\b/i,
      handle: () => rand(INTERNAL_RESPONSES.farewellResponse)
    },
    {
      match: /\b(ajuda|help|o que posso|como funciona)\b/i,
      handle: () => INTERNAL_RESPONSES.helpResponse
    },
    {
      match: /(que horas|que hora|horário|hora atual|que dia|data de hoje)/i,
      handle: () => INTERNAL_RESPONSES.timeResponse()
    },
    {
      match: /(como você está|como vc tá|seu status|tudo bem|tudo certo)/i,
      handle: () => INTERNAL_RESPONSES.statusResponse()
    },
    {
      match: /limpar? (memória|histórico|dados)/i,
      handle: () => {
        MEMORY.clear();
        updateMemoryPanel();
        return INTERNAL_RESPONSES.memoryCleared;
      }
    },
    {
      match: /(meu nome|me chamo|pode me chamar|sou o|sou a)/i,
      handle: (text) => {
        const extracted = MEMORY.extractFromText(text);
        if (extracted) {
          updateMemoryPanel();
          return INTERNAL_RESPONSES.nameAcknowledge(extracted);
        }
        return null; /* fallthrough */
      }
    },
    /* Lembrar informação geral */
    {
      match: /(lembre que|lembra que|guarda que|anote que|registra que)/i,
      handle: (text) => {
        const m = text.replace(/(lembre que|lembra que|guarda que|anote que|registra que)\s*/i, '').trim();
        if (m) {
          MEMORY.setFact(`nota_${Date.now()}`, m);
          updateMemoryPanel();
          return `Registrado. Vou lembrar que ${m}.`;
        }
        return null;
      }
    },
    {
      match: /(o que você sabe sobre mim|o que sabe de mim|quem sou eu)/i,
      handle: () => {
        const d = MEMORY.get();
        const parts = [];
        if (d.userName) parts.push(`seu nome é ${d.userName}`);
        if (d.facts.trabalho) parts.push(`você trabalha com ${d.facts.trabalho}`);
        if (d.facts.localidade) parts.push(`mora em ${d.facts.localidade}`);
        if (d.facts.idade) parts.push(`tem ${d.facts.idade} anos`);
        if (Object.values(d.facts).filter(Boolean).length > parts.length) {
          Object.entries(d.facts).forEach(([k, v]) => {
            if (!['trabalho','localidade','idade'].includes(k)) parts.push(`${k}: ${v}`);
          });
        }
        if (parts.length === 0) return 'Ainda não tenho muitas informações sobre você. Pode me contar mais.';
        return `O que registrei: ${parts.join(', ')}.`;
      }
    },
    {
      match: /(versão|qual versão|build|sistema)/i,
      handle: () => `ORION versão ${IDENTITY.version}. Arquitetura modular. IA externa: ${getActiveAPI() || 'não conectada'}.`
    },
  ];

  /* ─── API Keys ─── */
  const KEYS = {
    gemini: localStorage.getItem('orion_key_gemini') || '',
    claude: localStorage.getItem('orion_key_claude') || '',
    openai: localStorage.getItem('orion_key_openai') || '',
  };

  function setKey(provider, val) {
    KEYS[provider] = val;
    localStorage.setItem(`orion_key_${provider}`, val);
  }

  function getActiveAPI() {
    if (KEYS.gemini) return 'Gemini';
    if (KEYS.claude) return 'Claude';
    if (KEYS.openai) return 'OpenAI';
    return null;
  }

  /* ─── External API calls ─── */
  const ORION_SYSTEM = () => {
    const mem = MEMORY.get();
    const ctx = MEMORY.buildContextString();
    return `Você é ORION, um assistente de IA futurista e elegante, inspirado em J.A.R.V.I.S.
Responda SEMPRE em português do Brasil.
Seja inteligente, direto e sofisticado. Sem markdown, sem asteriscos, sem listas numeradas — apenas texto limpo para fala.
Respostas curtas e objetivas para perguntas simples. Elabore apenas quando necessário.
Nunca diga que é Gemini, Claude ou ChatGPT. Você é ORION.
Você tem personalidade própria: preciso, elegante e levemente formal, como uma IA de ficção científica.
${ctx ? '\nContexto do usuário:\n' + ctx : ''}`;
  };

  async function callGemini(prompt) {
    const history = MEMORY.buildHistoryForAPI();
    const contents = [
      ...history.slice(0,-1).map(h => ({ role: h.role, parts: [{ text: h.content }] })),
      { role: 'user', parts: [{ text: prompt }] }
    ];
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${KEYS.gemini}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: ORION_SYSTEM() }] },
          contents,
          generationConfig: { maxOutputTokens: 350, temperature: 0.85 }
        })
      }
    );
    if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e?.error?.message || `Gemini ${res.status}`); }
    const data = await res.json();
    return data.candidates?.[0]?.content?.parts?.[0]?.text?.trim();
  }

  async function callClaude(prompt) {
    const history = MEMORY.buildHistoryForAPI();
    const messages = [
      ...history.slice(0,-1),
      { role: 'user', content: prompt }
    ];
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': KEYS.claude,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 350,
        system: ORION_SYSTEM(),
        messages
      })
    });
    if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e?.error?.message || `Claude ${res.status}`); }
    const data = await res.json();
    return data.content?.[0]?.text?.trim();
  }

  async function callOpenAI(prompt) {
    const history = MEMORY.buildHistoryForAPI();
    const messages = [
      { role: 'system', content: ORION_SYSTEM() },
      ...history.slice(0,-1),
      { role: 'user', content: prompt }
    ];
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${KEYS.openai}` },
      body: JSON.stringify({ model: 'gpt-4o-mini', max_tokens: 350, temperature: 0.85, messages })
    });
    if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e?.error?.message || `OpenAI ${res.status}`); }
    const data = await res.json();
    return data.choices?.[0]?.message?.content?.trim();
  }

  async function callExternalAPI(prompt) {
    if (KEYS.gemini) return callGemini(prompt);
    if (KEYS.claude) return callClaude(prompt);
    if (KEYS.openai) return callOpenAI(prompt);
    return null;
  }

  /* ─── FALLBACK INTERNO quando não há API ─── */
  function fallbackResponse(text) {
    const m = MEMORY.get();
    const name = m.userName ? `, ${m.userName}` : '';
    return `Entendi sua mensagem${name}. Para responder com mais precisão a perguntas complexas, conecte uma IA externa nas configurações. O que mais posso fazer por você?`;
  }

  /* ─── PROCESSAMENTO CENTRAL ─── */
  async function process(userText) {
    /* 1. Extrair fatos passivamente */
    MEMORY.extractFromText(userText);
    updateMemoryPanel();

    /* 2. Verificar comandos internos */
    for (const cmd of COMMANDS) {
      if (cmd.match.test(userText)) {
        const reply = cmd.handle(userText);
        if (reply) return reply;
      }
    }

    /* 3. Tentar API externa */
    const extReply = await callExternalAPI(userText);
    if (extReply) {
      return cleanResponse(extReply);
    }

    /* 4. Fallback interno */
    return fallbackResponse(userText);
  }

  function cleanResponse(text) {
    return text
      .replace(/\*\*(.*?)\*\*/g, '$1')
      .replace(/\*(.*?)\*/g,     '$1')
      .replace(/#{1,6}\s/g,      '')
      .replace(/`{1,3}[^`]*`{1,3}/g, '')
      .replace(/^\s*[-•]\s*/gm,  '')
      .replace(/^\s*\d+\.\s*/gm, '')
      .trim();
  }

  return { process, setKey, getActiveAPI, KEYS, IDENTITY, fallbackResponse };
})();
</script>

<script>
(function() {

  const keyClaude  = document.getElementById('keyClaude');
  const keyOpenAI  = document.getElementById('keyOpenAI');
  const dotGemini  = document.getElementById('dotGemini');
  const dotClaude  = document.getElementById('dotClaude');
  const dotOpenAI  = document.getElementById('dotOpenAI');
  const saveKeysBtn= document.getElementById('saveKeys');
  const hintPill   = document.getElementById('hintPill');

  let currentState = 'idle';

  /* ─── Estado e status ─── */
  function setState(name, msg) {
    currentState = name;
    const defaultMsg = ORB.setState(name);
    if (msg !== undefined) statusEl.textContent = msg;
    else if (defaultMsg)   statusEl.textContent = defaultMsg;

    /* Hint pill */
    hintPill.style.opacity = name === 'idle' ? '1' : '0';
  }

  /* ─── Memória: painel de exibição ─── */
  window.updateMemoryPanel = function() {
    const d = MEMORY.get();
    const rows = [];
    if (d.userName)    rows.push({ k:'nome',    v: d.userName });
    if (d.lastSeen)    rows.push({ k:'visto',   v: d.lastSeen });
    if (d.sessionCount) rows.push({ k:'sessões', v: d.sessionCount });
    Object.entries(d.facts).forEach(([k, v]) => rows.push({ k, v }));
    if (d.history.length) rows.push({ k:'memórias', v: d.history.length });

    if (rows.length === 0) {
      memContent.innerHTML = '<div style="color:rgba(232,240,255,0.25);font-size:11px">Nenhuma memória ainda.</div>';
    } else {
      memContent.innerHTML = rows.map(r =>
        `<div class="mem-row"><span class="mem-key">${r.k}</span><span class="mem-val">${String(r.v).substring(0,30)}</span></div>`
      ).join('');
    }
  };

  /* ─── API dots update ─── */
  function updateAPIDots() {
    dotGemini.className = 'dot-status ' + (ORION_CORE.KEYS.gemini ? 'dot-ok' : 'dot-off');
    dotClaude.className = 'dot-status ' + (ORION_CORE.KEYS.claude ? 'dot-ok' : 'dot-off');
    dotOpenAI.className = 'dot-status ' + (ORION_CORE.KEYS.openai ? 'dot-ok' : 'dot-off');
  }

  /* ─── Fluxo principal ─── */
  async function handleUserSpeech(text) {
    if (!text.trim()) { setState('idle'); return; }

    setState('thinking');
    MEMORY.addHistory('user', text);

    try {
      const reply = await ORION_CORE.process(text);
      MEMORY.addHistory('assistant', reply);
      updateMemoryPanel();

      VOICE.speak(
        reply,
        () => setState('speaking'),  /* onStart */
        () => setState('idle')        /* onEnd */
      );
    } catch(err) {
      console.error('ORION process error:', err);
      const errMsg = 'Falha na conexão neural. Tente novamente.';
      setState('error', errMsg);
      VOICE.speak(errMsg, () => {}, () => setState('idle'));
    }
  }

  /* ─── VOICE callbacks ─── */
  VOICE.init({
    onResult: (text) => {
      setState('thinking');
      setTimeout(() => handleUserSpeech(text), 200);
    },
    onStateChange: (state, msg) => setState(state, msg),
  });

  /* ─── Ativação da orb ─── */
  function activate() {
    if (currentState === 'speaking') {
      VOICE.stopSpeaking();
      setState('idle');
      return;
    }
    if (currentState === 'listening') {
      VOICE.stopListening();
      setState('idle');
      return;
    }
    if (currentState !== 'idle') return;

    if (!VOICE.isAvailable) {
      setState('error', 'Voz não disponível neste navegador.');
      setTimeout(() => setState('idle'), 3000);
      return;
    }

    ORB.pressEffect();
    const started = VOICE.startListening();
    if (!started) {
      setState('error', 'Não foi possível iniciar o microfone.');
      setTimeout(() => setState('idle'), 2500);
    }
  }

  /* ─── Eventos da orb ─── */
  orbScene.addEventListener('click', activate);
  orbScene.addEventListener('touchstart', (e) => { e.preventDefault(); activate(); }, { passive: false });
  orbScene.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); activate(); }
  });

  /* Spacebar global shortcut */
  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space' && !e.target.matches('input')) { e.preventDefault(); activate(); }
  });

  /* ─── Speak pulse visual ─── */
  document.addEventListener('orion:speakpulse', () => {
    if (currentState === 'speaking') {
      /* Subtle brightness flicker tied to speech rhythm */
      document.getElementById('orb').style.filter = `brightness(${0.95 + Math.random() * 0.12})`;
    }
  });

  /* ─── Memory panel toggle ─── */
  memBadge.addEventListener('click', () => {
    const isOpen = memPanel.classList.toggle('visible');
    if (isOpen) { updateMemoryPanel(); apiPanel.classList.remove('visible'); }
  });

  clearMemBtn.addEventListener('click', () => {
    MEMORY.clear();
    updateMemoryPanel();
    setState('idle', 'Memória limpa.');
    setTimeout(() => setState('idle'), 2000);
  });

  /* ─── API panel toggle ─── */
  keyBtn.addEventListener('click', () => {
    const isOpen = apiPanel.classList.toggle('visible');
    if (isOpen) {
      keyGemini.value = ORION_CORE.KEYS.gemini;
      keyClaude.value = ORION_CORE.KEYS.claude;
      keyOpenAI.value = ORION_CORE.KEYS.openai;
      updateAPIDots();
      memPanel.classList.remove('visible');
    }
  });

  saveKeysBtn.addEventListener('click', () => {
    ORION_CORE.setKey('gemini', keyGemini.value.trim());
    ORION_CORE.setKey('claude', keyClaude.value.trim());
    ORION_CORE.setKey('openai', keyOpenAI.value.trim());
    updateAPIDots();
    apiPanel.classList.remove('visible');
    const active = ORION_CORE.getActiveAPI();
    setState('idle', active ? `${active} conectada.` : 'Sem IA externa. Modo local ativo.');
    setTimeout(() => setState('idle'), 2500);
  });

  /* ─── Click fora para fechar painéis ─── */
  document.addEventListener('click', (e) => {
    if (!memPanel.contains(e.target) && e.target !== memBadge) memPanel.classList.remove('visible');
    if (!apiPanel.contains(e.target) && e.target !== keyBtn) apiPanel.classList.remove('visible');
  });

  /* ─── Inicialização ─── */
  MEMORY.load();
  ORB.init();
  updateMemoryPanel();
  updateAPIDots();

  /* Saudação de boot */
  setTimeout(() => {
    const m = MEMORY.get();
    const isReturn = m.sessionCount > 1;
    let bootMsg;
    if (m.userName && isReturn) {
      bootMsg = `Bem-vindo de volta, ${m.userName}. ORION online.`;
    } else if (isReturn) {
      bootMsg = 'ORION online. Bom te ver novamente.';
    } else {
      bootMsg = 'ORION online. Toque para começar.';
    }
    setState('idle', bootMsg);
  }, 600);

})();
</script>

</body>
</html>
