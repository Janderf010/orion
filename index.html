<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ORION AI</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#020812;
  --blue:#00d4ff;
  --green:#00ff99;
  --red:#ff3333;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:
  radial-gradient(circle at center,
  #091424 0%,
  #020812 70%);

  overflow:hidden;
  height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;

  font-family:'Inter',sans-serif;
  color:white;
}

/* GRID */

#grid{
  position:fixed;
  inset:0;

  background-image:
  linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
  linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);

  background-size:40px 40px;

  z-index:0;
}

/* PARTICLES */

canvas{
  position:fixed;
  inset:0;
  z-index:1;
}

/* CONTAINER */

.container{
  position:relative;
  z-index:2;

  display:flex;
  flex-direction:column;
  align-items:center;
}

/* ORB */

.orb-wrapper{
  position:relative;

  width:320px;
  height:320px;

  display:flex;
  justify-content:center;
  align-items:center;

  cursor:pointer;
}

.orb-ring{
  position:absolute;

  border-radius:50%;
  border:1px solid rgba(0,212,255,0.3);

  animation:rotate 12s linear infinite;
}

.ring1{
  width:220px;
  height:220px;
}

.ring2{
  width:280px;
  height:280px;

  animation-direction:reverse;
  animation-duration:18s;
}

.orb{

  width:160px;
  height:160px;

  border-radius:50%;

  background:
  radial-gradient(circle at 30% 30%,
  #59e7ff,
  #0066aa,
  #001122);

  box-shadow:
  0 0 40px var(--blue),
  0 0 100px rgba(0,212,255,0.5);

  transition:0.3s ease;

  animation:pulse 4s infinite;
}

/* STATES */

.listening{

  background:
  radial-gradient(circle at 30% 30%,
  #88ffd9,
  #00ff99,
  #002211);

  box-shadow:
  0 0 70px var(--green),
  0 0 150px rgba(0,255,153,0.5);

}

.speaking{

  background:
  radial-gradient(circle at 30% 30%,
  #88ffd9,
  #00ff99,
  #002211);

}

.error{

  background:
  radial-gradient(circle at 30% 30%,
  #ff8888,
  #ff0000,
  #220000);

  box-shadow:
  0 0 60px var(--red),
  0 0 140px rgba(255,0,0,0.5);

}

/* TEXT */

.title{

  margin-top:40px;

  font-family:'Orbitron',sans-serif;

  font-size:58px;

  letter-spacing:14px;

  color:var(--blue);

  text-shadow:
  0 0 20px var(--blue),
  0 0 50px rgba(0,212,255,0.5);

}

.status{

  margin-top:16px;

  color:#8cb8d1;

  font-size:18px;

  max-width:700px;

  text-align:center;

  line-height:1.6;
}

/* ANIMATIONS */

@keyframes rotate{

  from{
    transform:rotate(0deg);
  }

  to{
    transform:rotate(360deg);
  }

}

@keyframes pulse{

  0%{
    transform:scale(1);
  }

  50%{
    transform:scale(1.05);
  }

  100%{
    transform:scale(1);
  }

}

</style>
</head>

<body>

<div id="grid"></div>

<canvas id="particles"></canvas>

<div class="container">

  <div class="orb-wrapper" id="orbWrapper">

    <div class="orb-ring ring1"></div>
    <div class="orb-ring ring2"></div>

    <div class="orb" id="orb"></div>

  </div>

  <h1 class="title">ORION</h1>

  <p class="status" id="status">
    Sistema inicializado...
  </p>

</div>

<script>

/* =========================
   CONFIG
========================= */

const GEMINI_API_KEY = "COLE_SUA_API_KEY_AQUI";

/* =========================
   ELEMENTS
========================= */

const orb = document.getElementById("orb");
const statusText = document.getElementById("status");

/* =========================
   VOICE RECOGNITION
========================= */

const SpeechRecognition =
window.SpeechRecognition ||
window.webkitSpeechRecognition;

const recognition =
new SpeechRecognition();

recognition.lang = "pt-BR";
recognition.interimResults = false;
recognition.continuous = false;

/* =========================
   SPEECH
========================= */

const synth = window.speechSynthesis;

/* =========================
   STATES
========================= */

function setState(state){

  orb.classList.remove(
    "listening",
    "speaking",
    "error"
  );

  if(state){
    orb.classList.add(state);
  }

}

/* =========================
   START LISTENING
========================= */

function iniciarEscuta(){

  recognition.start();

}

document
.getElementById("orbWrapper")
.addEventListener("click", iniciarEscuta);

/* =========================
   EVENTS
========================= */

recognition.onstart = () => {

  setState("listening");

  statusText.innerText =
  "Estou ouvindo...";

};

recognition.onerror = () => {

  setState("error");

  statusText.innerText =
  "Erro ao ouvir.";

  setTimeout(() => {

    setState();

  }, 2000);

};

recognition.onresult = async (event) => {

  const text =
  event.results[0][0].transcript;

  statusText.innerText =
  "Você disse: " + text;

  responder(text);

};

/* =========================
   GEMINI
========================= */

async function responder(text){

  setState("listening");

  statusText.innerText =
  "ORION processando...";

  try{

    const response = await fetch(

      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`,

      {

        method:"POST",

        headers:{
          "Content-Type":"application/json"
        },

        body:JSON.stringify({

          contents:[

            {

              parts:[

                {

                  text:
                  `Você é ORION, uma IA futurista estilo JARVIS.

Responda em português do Brasil.

Seja inteligente, elegante, tecnológica e natural.

Usuário disse:
${text}`

                }

              ]

            }

          ]

        })

      }

    );

    const data =
    await response.json();

    console.log(data);

    const reply =
    data.candidates[0]
    .content.parts[0].text;

    falar(reply);

  }

  catch(err){

    console.log(err);

    setState("error");

    statusText.innerText =
    "Falha neural.";

    setTimeout(() => {

      setState();

    }, 2000);

  }

}

/* =========================
   SPEAK
========================= */

function falar(text){

  statusText.innerText = text;

  const utterance =
  new SpeechSynthesisUtterance(text);

  utterance.lang = "pt-BR";

  utterance.rate = 1;

  utterance.pitch = 0.9;

  utterance.onstart = () => {

    setState("speaking");

    pulseAnimation();

  };

  utterance.onend = () => {

    stopPulse();

    setState();

  };

  synth.speak(utterance);

}

/* =========================
   ORB PULSE
========================= */

let pulse;

function pulseAnimation(){

  pulse = setInterval(() => {

    orb.style.transform =
    `scale(${1 + Math.random()*0.25})`;

  }, 120);

}

function stopPulse(){

  clearInterval(pulse);

  orb.style.transform =
  "scale(1)";

}

/* =========================
   PARTICLES
========================= */

const canvas =
document.getElementById("particles");

const ctx =
canvas.getContext("2d");

let particles = [];

function resize(){

  canvas.width =
  window.innerWidth;

  canvas.height =
  window.innerHeight;

}

window.addEventListener(
"resize",
resize
);

resize();

class Particle{

  constructor(){

    this.reset();

  }

  reset(){

    this.x =
    Math.random()*canvas.width;

    this.y =
    Math.random()*canvas.height;

    this.size =
    Math.random()*2;

    this.speed =
    Math.random()*0.5 + 0.2;

    this.opacity =
    Math.random()*0.5;

  }

  update(){

    this.y -= this.speed;

    if(this.y < 0){

      this.reset();

      this.y =
      canvas.height;

    }

  }

  draw(){

    ctx.beginPath();

    ctx.arc(
      this.x,
      this.y,
      this.size,
      0,
      Math.PI*2
    );

    ctx.fillStyle =
    `rgba(0,212,255,${this.opacity})`;

    ctx.fill();

  }

}

for(let i=0;i<100;i++){

  particles.push(
    new Particle()
  );

}

function animate(){

  ctx.clearRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  particles.forEach(p => {

    p.update();

    p.draw();

  });

  requestAnimationFrame(
    animate
  );

}

animate();

</script>

</body>
</html>
