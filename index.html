<!DOCTYPE html>
<html lang="pt">
<body>

<div id="background-grid"></div>

<div id="orion-container">

  <div class="orb-wrapper">
    <div class="orb-ring"></div>
    <div class="orb-ring delay"></div>

    <div class="orb" id="orb"></div>
  </div>

  <h1 class="title">ORION</h1>

  <p class="status" id="status">
    Sistema inicializado...
  </p>

  <button id="voice-btn">
    🎙️ FALAR COM ORION
  </button>

</div>

<script>

const orb = document.getElementById("orb");
const statusText = document.getElementById("status");
const voiceBtn = document.getElementById("voice-btn");

const SpeechRecognition =
window.SpeechRecognition ||
window.webkitSpeechRecognition;

const recognition = new SpeechRecognition();

recognition.lang = "pt-BR";
recognition.continuous = false;
recognition.interimResults = false;

voiceBtn.addEventListener("click", () => {

  recognition.start();

  statusText.innerText = "Estou ouvindo...";

  orb.classList.add("listening");

});

recognition.onresult = async (event) => {

  const text = event.results[0][0].transcript;

  statusText.innerText = "Você disse: " + text;

  orb.classList.remove("listening");

  responder(text);

};

recognition.onerror = () => {

  statusText.innerText = "Erro ao capturar voz.";

  orb.classList.remove("listening");

};

async function responder(text){

  statusText.innerText = "ORION está pensando...";

  orb.classList.add("thinking");

  try{

    const response = await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",

      headers:{
        "Content-Type":"application/json",

        "Authorization":"Bearer SUA_API_KEY"
      },

      body:JSON.stringify({
        model:"gpt-4o-mini",

        messages:[
          {
            role:"system",
            content:"Você é ORION, uma IA futurista, inteligente e elegante."
          },

          {
            role:"user",
            content:text
          }
        ]
      })
    });

    const data = await response.json();

    const reply =
    data.choices[0].message.content;

    falar(reply);

  }

  catch(err){

    statusText.innerText =
    "Falha neural.";

    orb.classList.remove("thinking");

  }

}

function falar(text){

  statusText.innerText = text;

  const speech =
  new SpeechSynthesisUtterance(text);

  speech.lang = "pt-BR";

  speech.pitch = 0.9;

  speech.rate = 1;

  speech.volume = 1;

  speech.onstart = () => {

    orb.classList.add("speaking");

  };

  speech.onend = () => {

    orb.classList.remove("speaking");

  };

  speechSynthesis.speak(speech);

}

</script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  overflow:hidden;

  background:#020812;

  font-family:Arial;

  height:100vh;

  display:flex;

  justify-content:center;

  align-items:center;

  color:white;
}

#background-grid{

  position:fixed;
  inset:0;

  background-image:
  linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
  linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);

  background-size:40px 40px;

  z-index:0;
}

#orion-container{

  position:relative;

  z-index:2;

  display:flex;

  flex-direction:column;

  align-items:center;

  gap:24px;
}

.title{

  font-size:58px;

  letter-spacing:12px;

  color:#00d4ff;

  text-shadow:
  0 0 20px #00d4ff,
  0 0 40px #00d4ff55;
}

.status{

  color:#7db7d1;

  font-size:18px;

  width:600px;

  text-align:center;

  line-height:1.6;
}

.orb-wrapper{

  position:relative;

  width:220px;
  height:220px;

  display:flex;
  justify-content:center;
  align-items:center;
}

.orb{

  width:160px;
  height:160px;

  border-radius:50%;

  background:
  radial-gradient(circle at 30% 30%,
  #3fe8ff,
  #0066aa,
  #001122);

  box-shadow:
  0 0 40px #00d4ff,
  0 0 80px #00d4ff55,
  inset 0 0 40px rgba(255,255,255,0.1);

  animation:pulse 4s infinite;

  transition:all 0.3s ease;
}

.orb-ring{

  position:absolute;

  width:210px;
  height:210px;

  border-radius:50%;

  border:1px solid rgba(0,212,255,0.25);

  animation:rotate 10s linear infinite;
}

.orb-ring.delay{

  width:250px;
  height:250px;

  animation-direction:reverse;

  animation-duration:16s;
}

.listening{

  transform:scale(1.15);

  box-shadow:
  0 0 60px #00ff99,
  0 0 120px #00ff9955;
}

.thinking{

  animation:thinking 1s infinite;
}

.speaking{

  animation:speaking 0.4s infinite;
}

#voice-btn{

  padding:16px 28px;

  border:none;

  background:#00d4ff;

  color:#001018;

  font-weight:bold;

  border-radius:999px;

  cursor:pointer;

  font-size:16px;

  letter-spacing:2px;

  transition:0.3s;
}

#voice-btn:hover{

  transform:scale(1.05);

  box-shadow:
  0 0 25px #00d4ff;
}

@keyframes pulse{

  0%{
    transform:scale(1);
  }

  50%{
    transform:scale(1.05);
  }

  100%{
    transform:scale(1);
  }
}

@keyframes rotate{

  from{
    transform:rotate(0deg);
  }

  to{
    transform:rotate(360deg);
  }
}

@keyframes thinking{

  0%{
    filter:hue-rotate(0deg);
  }

  100%{
    filter:hue-rotate(360deg);
  }
}

@keyframes speaking{

  0%{
    transform:scale(1);
  }

  50%{
    transform:scale(1.1);
  }

  100%{
    transform:scale(1);
  }
}

</style>
